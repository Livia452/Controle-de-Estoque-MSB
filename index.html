<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque de Produto Acabado — PCP</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#f0f5f6;--surface:#fff;--border:rgba(0,0,0,.10);--border-med:rgba(0,0,0,.18);
  --text:#1a2628;--muted:#4e6569;--hint:#7a9499;
  --accent:#3D9DAE;--accent-bg:#E4F3F6;--accent-dark:#2d7d8c;
  --ok-bg:#E4F5EC;--ok-text:#1A6639;
  --warn-bg:#FEF3E2;--warn-text:#7A4B00;
  --danger-bg:#FEECEC;--danger-text:#841E1E;
  --high-bg:#E8F1FB;--high-text:#1A3F7A;
  --excess-bg:#F3EEF9;--excess-text:#5A2A8A;
  --r-sm:6px;--r-md:8px;--r-lg:12px;
  --shadow:0 1px 3px rgba(61,157,174,.10);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0f1e21;--surface:#172528;--border:rgba(255,255,255,.10);--border-med:rgba(255,255,255,.18);
    --text:#dff0f2;--muted:#7ab4bc;--hint:#5a8f97;
    --accent:#5BBFCE;--accent-bg:#0a2b30;--accent-dark:#7DCFDB;
    --ok-bg:#0d3320;--ok-text:#7ECFA0;
    --warn-bg:#372000;--warn-text:#FAC775;
    --danger-bg:#3d1010;--danger-text:#F7C1C1;
    --high-bg:#0c2040;--high-text:#90B8F0;
    --excess-bg:#22103a;--excess-text:#C49FE8;
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.6;color:var(--text);background:var(--bg);min-height:100vh}
h1,h2{font-weight:500;line-height:1.3}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit;font-size:14px}
.app{max-width:1100px;margin:0 auto;padding:0 24px 60px}

/* Nav */
.nav{display:flex;border-bottom:1px solid var(--border);padding-top:20px;margin-bottom:2rem}
.tab-btn{padding:10px 22px;font-size:14px;font-weight:500;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);transition:color .15s,border-color .15s;display:flex;align-items:center;gap:6px}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--accent)}

/* Views */
.view{display:none}.view.active{display:block}
.page-title{font-size:20px;font-weight:500;margin-bottom:3px}
.last-update{font-size:12px;color:var(--hint)}
.section-title{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.dashboard-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
@media(max-width:680px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;box-shadow:var(--shadow)}
.kpi-label{font-size:12px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.kpi-value{font-size:26px;font-weight:500}
.kpi-sub{font-size:11px;color:var(--hint);margin-top:3px}
.text-warn{color:var(--warn-text)}.text-danger{color:var(--danger-text)}

/* Alert */
.alert{background:var(--danger-bg);border:1px solid var(--danger-text);border-left:4px solid var(--danger-text);border-radius:0 var(--r-md) var(--r-md) 0;padding:10px 14px;font-size:13px;color:var(--danger-text);margin-bottom:1.25rem;display:flex;align-items:center;gap:8px}
.alert-crit{background:var(--danger-bg);border:1px solid var(--danger-text);border-left:4px solid var(--danger-text);border-radius:0 var(--r-md) var(--r-md) 0;padding:14px 16px;margin-bottom:1.25rem}
.alert-crit-hd{display:flex;align-items:center;gap:8px;color:var(--danger-text);font-size:13px;font-weight:500;margin-bottom:10px}
.alert-crit-sub{margin-left:auto;font-size:11px;font-weight:400;opacity:.8;white-space:nowrap}
.alert-crit-chips{display:flex;flex-wrap:wrap;gap:6px}
.crit-chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--danger-text);border-radius:20px;padding:4px 10px;font-size:12px}
.crit-chip strong{color:var(--danger-text)}
.crit-chip-desc{color:var(--muted);font-size:11px}
.crit-more{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:12px;color:var(--muted);border:1px dashed var(--border-med)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:24px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:0 8px 32px rgba(0,0,0,.18);width:100%;max-width:540px;max-height:90vh;display:flex;flex-direction:column}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:16px;font-weight:500}
.modal-body{padding:20px 24px;overflow-y:auto}

/* Loading overlay */
.loading-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:0 8px 32px rgba(0,0,0,.18);padding:32px 40px;display:flex;flex-direction:column;align-items:center;gap:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--text)}

/* Table */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--r-lg);background:var(--surface);box-shadow:var(--shadow);margin-bottom:1.75rem}
/* Tabelas longas (muitas linhas): trava a altura pra rolagem horizontal ficar sempre visível, sem precisar rolar a página até o fim */
.tbl-wrap-scroll{max-height:70vh;overflow-y:auto}
.tbl-wrap-scroll thead th{position:sticky;top:0;z-index:1}
table{width:100%;border-collapse:collapse;font-size:13px}
.td-desc{max-width:220px;vertical-align:top}
.td-desc>div{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.35;white-space:normal;font-size:12px}
th{padding:9px 10px;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);background:var(--bg);white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg)}
.num{text-align:right}.num-c{text-align:center}
.cov-bar{height:4px;background:var(--border);border-radius:2px;margin-top:5px;overflow:hidden}
.cov-fill{height:100%;border-radius:2px;transition:width .3s}
.empty{text-align:center;padding:2rem;color:var(--hint)}

/* Trend */
.t-up{color:var(--ok-text);font-size:12px;display:flex;align-items:center;gap:3px}
.t-down{color:var(--danger-text);font-size:12px;display:flex;align-items:center;gap:3px}
.t-stable{color:var(--hint);font-size:12px;display:flex;align-items:center;gap:3px}

/* Badges */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-ok{background:var(--ok-bg);color:var(--ok-text)}
.b-warn{background:var(--warn-bg);color:var(--warn-text)}
.b-crit{background:var(--danger-bg);color:var(--danger-text)}
.b-high{background:var(--high-bg);color:var(--high-text)}
.b-excess{background:var(--excess-bg);color:var(--excess-text)}
.b-nogiro{background:#EAECEE;color:#717D7E}
.b-new{background:var(--accent-bg);color:var(--accent)}
.b-upd{background:var(--ok-bg);color:var(--ok-text)}

/* Filter bar */
.filter-bar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:1.25rem;align-items:center}
.filter-search{display:flex;align-items:center;gap:8px;flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border-med);border-radius:var(--r-md);padding:7px 12px}
.filter-search i{color:var(--hint);flex-shrink:0}
.filter-search input{border:none;background:none;color:var(--text);font-size:13px;width:100%;outline:none}
.filter-search input::placeholder{color:var(--hint)}
.filter-select{padding:7px 12px;background:var(--surface);border:1px solid var(--border-med);border-radius:var(--r-md);color:var(--text);font-size:13px;cursor:pointer;outline:none}
.filter-select:focus{border-color:var(--accent)}
.filter-toggle{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer;white-space:nowrap;user-select:none}
.filter-toggle input{accent-color:var(--accent);cursor:pointer}
.filter-results{font-size:12px;color:var(--hint);margin-left:auto;white-space:nowrap}

/* Nav logo */
.nav-brand{display:flex;align-items:center;padding:14px 0 0}
.nav-logo{overflow:hidden;width:86px;height:40px;flex-shrink:0}
.nav-logo img{height:40px;width:auto;mix-blend-mode:multiply;display:block}
@media(prefers-color-scheme:dark){
  .nav-logo img{filter:invert(1) hue-rotate(180deg);mix-blend-mode:screen}
}
.nav-top{display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid var(--border)}
.nav-top .tab-btn{border-bottom:2px solid transparent;margin-bottom:-1px}

/* Chart */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow)}
.chart-wrap{position:relative;height:220px;width:100%}
.chart-legend{display:flex;flex-wrap:wrap;gap:16px;margin-top:12px;font-size:11px;color:var(--muted);align-items:center}
.lgd-swatch{display:inline-block;width:10px;height:10px;border-radius:2px;vertical-align:middle;margin-right:4px}
.clickable-cell{cursor:pointer;text-decoration:underline dotted var(--muted);color:var(--accent)!important}
.clickable-cell:hover{text-decoration:underline solid var(--accent)}
/* Seletor de colunas (estilo Power BI) */
.col-picker{position:relative}
.col-picker-menu{position:absolute;top:calc(100% + 4px);right:0;z-index:200;background:var(--surface);border:1px solid var(--border-med);border-radius:var(--r-md);box-shadow:0 6px 24px rgba(0,0,0,.15);padding:10px 14px;min-width:190px;max-height:300px;overflow-y:auto}
.col-picker-menu label{display:flex;gap:8px;align-items:center;font-size:13px;padding:4px 0;cursor:pointer;white-space:nowrap;color:var(--text)}
.col-picker-menu .col-picker-all{border-bottom:1px solid var(--border);padding-bottom:7px;margin-bottom:5px}
.lgd-line{display:flex;align-items:center;gap:5px;margin-left:auto}
.lgd-dash{display:inline-block;width:20px;border-top:2px dashed #185FA5}
.chart-view-tabs{display:flex;gap:6px;flex-wrap:wrap}
.chart-view-btn{padding:4px 12px;font-size:12px;border:1px solid var(--border);border-radius:20px;background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s}
.chart-view-btn:hover{border-color:var(--accent);color:var(--accent)}
.chart-view-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-size:13px;font-weight:500;border-radius:var(--r-md);border:1px solid var(--border-med);background:none;color:var(--text);transition:background .12s,opacity .12s}
.btn:hover{background:var(--bg)}.btn:active{opacity:.8}
.btn-primary{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.btn-primary:hover{background:var(--accent);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-icon{padding:6px 8px;border-radius:var(--r-sm)}
.btn-danger{color:var(--danger-text);border-color:var(--danger-text)}
.btn-danger:hover{background:var(--danger-bg)}
.btn-ghost{border-color:transparent;color:var(--muted)}
.btn-ghost:hover{background:var(--bg);color:var(--text)}

/* Form */
.editor{max-width:820px;margin:0 auto}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px;margin-bottom:1.5rem;box-shadow:var(--shadow)}
.field-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.field-label{font-size:13px;font-weight:500;color:var(--muted)}
.field-input{padding:8px 12px;border:1px solid var(--border-med);border-radius:var(--r-md);background:var(--bg);color:var(--text);font-size:14px;transition:border-color .12s;width:100%}
.field-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(24,95,165,.15)}
.months-fs{border:none;padding:0;margin-bottom:16px}
.months-fs legend{margin-bottom:10px;font-size:13px;font-weight:500;color:var(--muted)}
.months-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
@media(max-width:560px){.months-grid{grid-template-columns:repeat(3,1fr)}}
.m-cell{display:flex;flex-direction:column;gap:4px}
.m-cell label{font-size:11px;color:var(--hint);text-align:center}
.m-cell .field-input{text-align:center;padding:7px 4px}
.field-error{font-size:12px;color:var(--danger-text);min-height:18px;margin-bottom:8px}
.form-actions{display:flex;justify-content:flex-end;gap:8px}

/* Product list in editor */
.list-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--surface);margin-bottom:8px}
.li-body{display:flex;flex-direction:column;gap:2px;min-width:0}
.li-code{font-size:11px;font-weight:500;color:var(--muted)}
.li-desc{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-meta{font-size:11px;color:var(--hint)}
.li-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.btn-edit{color:var(--accent)}.btn-del{color:var(--danger-text)}
.danger-zone{display:flex;justify-content:flex-end;margin-top:8px}

/* ── Import cards ──────────────────────────────────────────── */
.import-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:1.5rem}
@media(max-width:640px){.import-grid{grid-template-columns:1fr}}
.import-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow)}
.import-card-title{font-size:14px;font-weight:500;margin-bottom:4px;display:flex;align-items:center;gap:7px}
.import-card-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.drop-zone{border:2px dashed var(--border-med);border-radius:var(--r-md);padding:20px 12px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;position:relative}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:var(--accent-bg)}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-zone-icon{font-size:28px;color:var(--muted);margin-bottom:6px}
.drop-zone-text{font-size:13px;color:var(--muted)}
.drop-zone-hint{font-size:11px;color:var(--hint);margin-top:4px}

/* Import preview */
.import-preview{margin-top:14px;display:none}
.import-preview.visible{display:block}
.import-info{font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.preview-tbl-wrap{max-height:240px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r-md)}
.preview-tbl{width:100%;border-collapse:collapse;font-size:12px}
.preview-tbl th{padding:7px 10px;font-size:11px;font-weight:500;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg);text-transform:uppercase;letter-spacing:.04em;position:sticky;top:0}
.preview-tbl td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text)}
.preview-tbl tbody tr:last-child td{border-bottom:none}
.preview-actions{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.preview-count{font-size:12px;color:var(--muted)}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 16px;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.12);display:flex;align-items:center;gap:8px;z-index:999;transform:translateY(100px);opacity:0;transition:transform .25s,opacity .25s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.t-ok{border-left:3px solid var(--ok-text);color:var(--text)}
.toast.t-err{border-left:3px solid var(--danger-text);color:var(--danger-text)}

/* Divider */
.divider{height:1px;background:var(--border);margin:1.5rem 0}
</style>
</head>
<body>
<div class="app">

<script>
/* ═══════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════ */
const STORAGE_KEY  = 'pcp_pa_v4';
const MONTHS_COUNT = 6;

/* Padrão de versionamento das chaves do localStorage: sufixo "_vN" no nome da chave
   (ex: pcp_mems_cols_v2). Quando o formato de uma chave muda de forma incompatível,
   suba o N e apague a chave antiga com removeOldVersions — não deixe a versão velha
   órfã pra sempre. loadJSON/saveJSON existem pra não repetir o try/JSON.parse/catch
   em cada `let xxx = (() => {...})()` espalhado pelo arquivo. */
function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
}
function saveJSON(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
function removeOldVersions(prefix, currentKey) {
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(prefix) && k !== currentKey) localStorage.removeItem(k);
  }
}

/* ═══════════════════════════════════════════════
   SUPABASE — client, sessão e papéis
   Leitura pública nos dados; escrita exige login (ver RLS em supabase/schema.sql).
   Criação de usuário é só pelo admin, via api/create-user.js (chave secreta
   nunca fica no navegador).
═══════════════════════════════════════════════ */
const SUPABASE_URL             = 'https://hytvtwtiekznvjhngtwl.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_8KRMNDDdFiJwUWxK0QtazQ_i0l_ADvx';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

let currentSession = null; // sessão do Supabase Auth, ou null
let currentProfile = null; // { id, email, role } da tabela profiles, ou null

function isLoggedIn() { return !!currentSession; }
function isAdmin()    { return currentProfile?.role === 'admin'; }

async function loadCurrentProfile() {
  if (!currentSession) { currentProfile = null; return; }
  const { data, error } = await sb.from('profiles').select('id,email,role').eq('id', currentSession.user.id).maybeSingle();
  currentProfile = error ? null : data;
}

async function doLogin(email, password) {
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) throw error;
  currentSession = data.session;
  await loadCurrentProfile();
}

async function doLogout() {
  await sb.auth.signOut();
  currentSession = null;
  currentProfile = null;
}

function renderNavAuth() {
  const el = document.getElementById('nav-auth');
  if (!el) return;
  if (!isLoggedIn()) {
    el.innerHTML = `<button class="btn btn-ghost btn-sm" id="btn-open-login"><i class="ti ti-login" aria-hidden="true"></i> Entrar</button>`;
    document.getElementById('btn-open-login')?.addEventListener('click', openLoginModal);
    return;
  }
  el.innerHTML = `
    <span style="font-size:12px;color:var(--muted)">${currentProfile?.email || currentSession.user.email}${isAdmin() ? ' · admin' : ''}</span>
    ${isAdmin() ? `<button class="btn btn-ghost btn-sm" id="btn-manage-users"><i class="ti ti-users" aria-hidden="true"></i> Gerenciar usuários</button>` : ''}
    <button class="btn btn-ghost btn-sm" id="btn-logout"><i class="ti ti-logout" aria-hidden="true"></i> Sair</button>
  `;
  document.getElementById('btn-manage-users')?.addEventListener('click', openManageUsersModal);
  document.getElementById('btn-logout')?.addEventListener('click', async () => {
    await doLogout();
    renderNavAuth();
    if (activeTab === 'editor') renderEditor();
    showToast('Sessão encerrada.');
  });
}

/* ── Modal de login (reaproveita #modal-overlay/#modal-body já usado pelo cadastro de item) ── */
function openLoginModal() {
  document.getElementById('modal-title').textContent = 'Entrar';
  document.getElementById('modal-body').innerHTML = `
    <div class="field-group">
      <label class="field-label" for="f-login-email">E-mail</label>
      <input class="field-input" id="f-login-email" type="email" autocomplete="username" placeholder="voce@msbbrasil.com">
    </div>
    <div class="field-group">
      <label class="field-label" for="f-login-pass">Senha</label>
      <input class="field-input" id="f-login-pass" type="password" autocomplete="current-password">
    </div>
    <p class="field-error" id="form-error" role="alert" aria-live="polite"></p>

async function onLoginSubmit() {
  const errEl = document.getElementById('form-error');
  errEl.textContent = '';
  const email = document.getElementById('f-login-email')?.value.trim();
  const pass  = document.getElementById('f-login-pass')?.value;
  if (!email || !pass) { errEl.textContent = 'Informe e-mail e senha.'; return; }
  const btn = document.getElementById('btn-login-submit');
  btn.disabled = true;
  try {
    await doLogin(email, pass);
    closeProductModal();
    renderNavAuth();
    if (activeTab === 'editor') renderEditor();
    showToast(`Bem-vinda, ${currentProfile?.email || email}.`);
  } catch (err) {
    errEl.textContent = 'E-mail ou senha inválidos.';
  } finally {
    btn.disabled = false;
  }
}

async function loadUsersList() {
  const el = document.getElementById('users-list');
  if (!el) return;
  const { data, error } = await sb.from('profiles').select('email,role').order('email');
  if (error) { el.textContent = 'Erro ao carregar usuários: ' + error.message; return; }
  el.innerHTML = (data||[]).map(u =>
    `<div style="display:flex;justify-content:space-between;padding:4px 0">
       <span>${u.email}</span><span class="badge ${u.role==='admin'?'b-high':'b-ok'}">${u.role}</span>
     </div>`
  ).join('') || 'Nenhum usuário cadastrado ainda.';
}

async function onCreateUserSubmit() {
  const errEl = document.getElementById('form-error');
  errEl.textContent = '';
  const email    = document.getElementById('f-nu-email')?.value.trim();
  const password = document.getElementById('f-nu-pass')?.value;
  const role     = document.getElementById('f-nu-role')?.value;
  if (!email || !password || password.length < 6) { errEl.textContent = 'E-mail válido e senha com pelo menos 6 caracteres.'; return; }
  const btn = document.getElementById('btn-nu-submit');
  btn.disabled = true;
  try {
    const res = await fetch('/api/create-user', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentSession.access_token}` },
      body: JSON.stringify({ email, password, role }),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'Falha ao criar usuário.');
    showToast(`Usuário ${email} criado.`);
    document.getElementById('f-nu-email').value = '';
    document.getElementById('f-nu-pass').value = '';
    loadUsersList();
  } catch (err) {
    errEl.textContent = err.message;
  } finally {
    btn.disabled = false;
  }
}

/* ═══════════════════════════════════════════════
   MONTH UTILITIES
═══════════════════════════════════════════════ */
// Janela de N meses PARA TRÁS, terminando no mês atual (não incluso).
function getLastNKeys(n) {
  const now = new Date();
  return Array.from({length: n}, (_, i) => {
    const d = new Date(now.getFullYear(), now.getMonth() - n + i, 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  });
}
function getLast6Keys() { return getLastNKeys(6); }
// Janela de 6 meses PRA FRENTE, começando no mês atual — usada pelo forecast
// (que é prospectivo), ao contrário de getLast6Keys (retrospectiva, usada pelo
// consumo real medido).
function getNext6Keys() {
  const now = new Date();
  return Array.from({length: 6}, (_, i) => {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  });
}
function toMonthKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
}
function fmtMonthKey(mk) {
  const [y, m] = mk.split('-');
  return new Date(+y, +m-1, 1).toLocaleDateString('pt-BR', { month:'short', year:'2-digit' });
}

/* ═══════════════════════════════════════════════
   MODEL FUNCTIONS (pure)
═══════════════════════════════════════════════ */
function getMonthlySales(p) {
  const sh = p.salesHistory || {};
  return getLast6Keys().map(k => sh[k] || 0);
}
// Espera um PRODUTO ACABADO (p.salesHistory) — para MATERIAIS (ME/MP/MS) use
// memsAvgConsumption(item), que lê item.consumoHistory. Não são intercambiáveis:
// chamar essa função com um material silenciosamente retorna 0 (sem erro).
function avgConsumption(p) {
  const ms = getMonthlySales(p);
  return ms.reduce((a, b) => a + b, 0) / ms.length;
}
function effectiveStock(p) {
  return p.stock + (dashFilters?.includeSA ? (p.stockSA || 0) : 0);
}
function coverage(p) {
  const a = avgConsumption(p);
  return a > 0 ? effectiveStock(p) / a : Infinity;
}
function productStatus(p) {
  if (effectiveStock(p) === 0 && avgConsumption(p) === 0) return STATUS.NOGIRO;
  const c = coverage(p);
  if (!Number.isFinite(c) || c > 12) return STATUS.EXCESS;
  if (c >= 6)  return STATUS.HIGH;
  if (c >= 2)  return STATUS.OK;
  if (c >= 1)  return STATUS.WARN;
  return STATUS.CRIT;
}
function salesTrend(p) {
  const ms   = getMonthlySales(p);
  const aOld = (ms[0]+ms[1]+ms[2]) / 3;
  const aNew = (ms[3]+ms[4]+ms[5]) / 3;
  if (aOld === 0) return { dir:'stable', pct:0 };
  const pct = ((aNew - aOld) / aOld) * 100;
  if (pct >  5) return { dir:'up',     pct: Math.round(pct) };
  if (pct < -5) return { dir:'down',   pct: Math.round(Math.abs(pct)) };
  return                { dir:'stable', pct: 0 };
}

function migrateProduct(raw) {
  if (raw.salesHistory) return raw;
  const keys = getLast6Keys();
  const salesHistory = {};
  (raw.monthlySales || []).forEach((qty, i) => { if (keys[i]) salesHistory[keys[i]] = qty; });
  const { monthlySales, ...rest } = raw;
  return { ...rest, salesHistory };
}

function paRowToProduct(row) {
  return migrateProduct({
    code: row.code, description: row.description, family: row.family,
    stock: row.stock, stockSA: row.stock_sa, salesHistory: row.sales_history || {},
  });
}
function paProductToRow(p) {
  return {
    code: p.code, description: p.description, family: p.family,
    stock: p.stock, stock_sa: p.stockSA, sales_history: p.salesHistory || {},
    updated_at: new Date().toISOString(),
  };
}

const storage = {
  async load() {
    const { data, error } = await sb.from('pa_products').select('*');
    if (error) { showToast('Erro ao carregar produtos: ' + error.message, 'err'); return []; }
    if (!data.length) {
      // Base ainda vazia: semeia com o catálogo padrão (só grava se já tiver login, por causa da RLS)
      const seeded = SEED.map(seed => ({ code: seed.code, description: seed.description, family: FAMILY_MAP[seed.code] || '', stock: 0, stockSA: 0, salesHistory: {} }));
      if (isLoggedIn()) await storage.save(seeded);
      return seeded;
    }
    return data.map(paRowToProduct);
  },
  async save(products) {
    if (!products.length) return;
    const { error } = await sb.from('pa_products').upsert(products.map(paProductToRow));
    if (error) throw new Error(error.message || JSON.stringify(error));
  },
  async remove(code) {
    const { error } = await sb.from('pa_products').delete().eq('code', code);
    if (error) showToast('Erro ao remover produto: ' + error.message, 'err');
  },
  async clear() {
    const { error } = await sb.from('pa_products').delete().neq('code', '');
    if (error) showToast('Erro ao limpar produtos: ' + error.message, 'err');
  },
};

/* ═══════════════════════════════════════════════
   STATE (pub/sub) — hidratado do Supabase via state._setAll() no boot()
═══════════════════════════════════════════════ */
const state = (() => {
  let products = [];
  const subs   = new Set();
  const notify = () => subs.forEach(fn => fn());

  function normalise(data) {
    return {
      code:         String(data.code).toUpperCase().trim(),
      description:  String(data.description || '').trim(),
      family:       String(data.family || '').trim(),
      stock:        Math.max(0, Math.round(Number(data.stock) || 0)),
      stockSA:      Math.max(0, Math.round(Number(data.stockSA) || 0)),
      salesHistory: data.salesHistory || {},
    };
  }

  return {
    getAll()        { return [...products]; },
    getByCode(code) { return products.find(p => p.code === String(code).toUpperCase()) ?? null; },

    async addOrUpdate(data) {
      const p = normalise(data);
      const i = products.findIndex(x => x.code === p.code);
      if (i >= 0) products[i] = { ...products[i], ...p };
      else        products.push(p);
      notify();
      await storage.save([p]);
    },

    async applyStockImport(items) {
      // Snapshot completo: zera tudo primeiro (arquivo Dynamics é posição atual)
      // Produtos ausentes no arquivo têm estoque 0
      if (items.length > 0) products.forEach(p => { p.stock = 0; });
      for (const item of items) {
        const code = String(item.code).toUpperCase().trim();
        const existing = products.find(p => p.code === code);
        if (existing) existing.stock = Math.max(0, Math.round(item.stock));
      }
      notify();
      await storage.save(products);
    },

    async applyStockSAImport(items) {
      // Zero all SA first — the Dynamics file is a full snapshot, so stale SA values must be cleared
      if (items.length > 0) products.forEach(p => { p.stockSA = 0; });
      for (const item of items) {
        const code = String(item.code).toUpperCase().trim();
        const existing = products.find(p => p.code === code);
        if (existing) existing.stockSA = Math.max(0, Math.round(item.stock));
      }
      notify();
      await storage.save(products); // zerou SA de todo mundo, precisa gravar todo mundo
    },

    async applySalesImport(salesMap) {
      // salesMap: { code: { 'YYYY-MM': qty } }
      const touched = [];
      for (const [code, monthData] of Object.entries(salesMap)) {
        const upper = code.toUpperCase();
        let p = products.find(x => x.code === upper);
        if (!p) continue;
        if (!p.salesHistory) p.salesHistory = {};
        for (const [mk, qty] of Object.entries(monthData)) {
          p.salesHistory[mk] = Math.max(0, Math.round(qty));
        }
        touched.push(p);
      }
      notify();
      await storage.save(touched);
    },

    async remove(code) {
      const upper = String(code).toUpperCase();
      products = products.filter(p => p.code !== upper);
      notify();
      await storage.remove(upper);
    },
    async reset() {
      await storage.clear();
      products = await storage.load();
      notify();
    },
    subscribe(fn){ subs.add(fn); return () => subs.delete(fn); },
    _setAll(arr) { products = arr; notify(); },
  };
})();

const ptBR  = new Intl.NumberFormat('pt-BR');
const ptBR1 = new Intl.NumberFormat('pt-BR', { minimumFractionDigits:1, maximumFractionDigits:1 });
const fmt = {
  int:   n   => ptBR.format(Math.round(n)),
  dec:   n   => ptBR1.format(n),
  cov:   n   => Number.isFinite(n) ? ptBR1.format(n) + ' m' : '—',
  dt:    ()  => new Date().toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }),
  month: off => { const d = new Date(); d.setDate(1); d.setMonth(d.getMonth()+off); return d.toLocaleDateString('pt-BR', { month:'short', year:'2-digit' }); },
};

/* ═══════════════════════════════════════════════
   EXCEL IMPORT — parsing
═══════════════════════════════════════════════ */
function readExcelFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb   = XLSX.read(new Uint8Array(e.target.result), { type:'array', cellDates:true });
        const ws   = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval:'' });
        resolve(rows);
      } catch(err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function toNum(val) {
  if (typeof val === 'number') return val;
  const s = String(val).trim().replace(/\.(?=\d{3}[,\.])/g,'').replace(',','.');
  return parseFloat(s) || 0;
}

function toDate(val) {
  if (val instanceof Date && !isNaN(val)) return val;
  const s = String(val).trim();
  // DD/MM/YYYY or YYYY-MM-DD
  const a = s.split(/[\/\-]/);
  if (a.length !== 3) return null;
  if (a[0].length === 4) return new Date(+a[0], +a[1]-1, +a[2]);
  return new Date(+a[2], +a[1]-1, +a[0]);
}

/* Agrega estoque: soma Quantidade física disponível por Número do item.
   Se a planilha tiver coluna de lote (nome detectado de forma flexível), também
   soma o saldo por (código + lote) — usado no cruzamento da aba Alertas com a
   planilha de validade. lotStock: mapa "CÓDIGO|LOTE" -> qty. */
function aggregateStock(rows) {
  const map = {};
  const lotStock = {};
  let skipped = 0;
  // nome da coluna de lote varia ("Nº do lote", "Lote", …) — acha a primeira que casa
  const lotKey = rows.length ? Object.keys(rows[0]).find(k => /lote/i.test(k)) : null;
  for (const row of rows) {
    const code = String(row[COL_STOCK.code] || '').trim();
    if (!code) { skipped++; continue; }
    const name = String(row[COL_STOCK.name] || '').trim();
    const qty  = toNum(row[COL_STOCK.qty]);
    if (!map[code]) map[code] = { code, description: name, stock: 0 };
    map[code].stock += qty;
    if (name && !map[code].description) map[code].description = name;
    if (lotKey) {
      const lot = String(row[lotKey] || '').trim();
      if (lot) {
        const k = code.toUpperCase() + '|' + lot.toUpperCase();
        lotStock[k] = (lotStock[k] || 0) + qty;
      }
    }
  }
  return { items: Object.values(map), lotStock, hasLot: !!lotKey, skipped };
}

/* Agrega vendas: soma abs(Quantidade) por (Número do item + mês de Data física) para linhas
   "Saída" (vendido), subtraindo as linhas "Recebimento" (comprado) do mesmo item/mês — no
   Dynamics, um "Comprado" é a reposição/estorno de um "Vendido" (ex: consignado) e precisa
   ser líquido, senão o total fica maior do que o relatório de vendas do Dynamics.
   Códigos "SA-..." (estoque secundário/consignado) são redirecionados para o produto PA
   correspondente via SA_REVERSE_MAP, do mesmo jeito que a importação de estoque já faz —
   senão as vendas lançadas sob o código SA ficam de fora do histórico do produto. */
function aggregateSales(rows) {
  const map = {};
  let skipped = 0;
  for (const row of rows) {
    let code    = String(row[COL_SALES.code] || '').trim();
    const saida = String(row[COL_SALES.exit] || '').trim();
    const receb = String(row[COL_SALES.receipt] || '').trim();
    if (!code || (!saida && !receb)) { skipped++; continue; }
    const paCode = SA_REVERSE_MAP[code.toUpperCase()];
    if (paCode) code = paCode;

    const qty = toNum(row[COL_SALES.qty]);
    if (qty === 0) continue;

    const date = toDate(row[COL_SALES.date]);
    if (!date) { skipped++; continue; }

    const mk = toMonthKey(date);
    if (!map[code]) map[code] = {};
    map[code][mk] = (map[code][mk] || 0) + (saida ? Math.abs(qty) : -Math.abs(qty));
  }
  return { salesMap: map, skipped };
}

/* Agrega consumo de materiais (mesmo layout de planilha bruta do Dynamics usado nas vendas,
   trocando "produto vendido" por "material consumido"): soma "Saída", subtrai "Recebimento",
   por (código do material + mês). Sem redirecionamento SA→PA, que é exclusivo de produto acabado. */
function aggregateMemsConsumo(rows) {
  const map = {};
  let skipped = 0;
  for (const row of rows) {
    const code  = String(row[COL_SALES.code] || '').trim().toUpperCase();
    const saida = String(row[COL_SALES.exit] || '').trim();
    const receb = String(row[COL_SALES.receipt] || '').trim();
    if (!code || (!saida && !receb)) { skipped++; continue; }

    const qty = toNum(row[COL_SALES.qty]);
    if (qty === 0) continue;

    const date = toDate(row[COL_SALES.date]);
    if (!date) { skipped++; continue; }

    const mk = toMonthKey(date);
    if (!map[code]) map[code] = {};
    map[code][mk] = (map[code][mk] || 0) + (saida ? Math.abs(qty) : -Math.abs(qty));
  }
  return { consumoMap: map, skipped };
}

function buildKpis(products) {
  const totalPA = products.reduce((s,p) => s + p.stock, 0);
  const totalSA = products.reduce((s,p) => s + (p.stockSA||0), 0);
  const totalEff = products.reduce((s,p) => s + effectiveStock(p), 0);
  const withData = products.filter(p => avgConsumption(p) > 0);
  const avgCov = withData.length ? withData.reduce((s,p) => s + coverage(p), 0) / withData.length : 0;
  const counts = {};
  Object.keys(STATUS).forEach(k => { counts[STATUS[k]] = 0; });
  products.forEach(p => counts[productStatus(p)]++);
  const saNote = dashFilters.includeSA && totalSA > 0 ? ` + ${fmt.int(totalSA)} SA` : '';
  const card = (dot, label, val, sub, cls='') => `
    <div class="kpi">
      <p class="kpi-label">${dot} ${label}</p>
      <p class="kpi-value ${cls}">${val}</p>
      <p class="kpi-sub">${sub}</p>
    </div>`;
  return `<div class="kpi-grid" style="grid-template-columns:repeat(5,1fr)">
    ${card('📦','Total em estoque', fmt.int(totalEff)+' un', `${fmt.int(totalPA)} PA${saNote} · ${products.length} produtos`)}
    ${card('📅','Cobertura média (c/vendas)', fmt.cov(avgCov), withData.length+' produtos c/ dados')}
    ${card('🔴','Crítico',  counts.crit,   '&lt; 1 mês',   counts.crit>0  ?'text-danger':'')}
    ${card('🟡','Atenção',  counts.warn,   '1 – 2 meses',  counts.warn>0  ?'text-warn':'')}
    ${card('🔵','Alto / Excessivo', counts.high+counts.excess, '&gt; 6 meses', '')}
  </div>`;
}

function buildAlert() { return ''; }

function buildFilterBar(total, shown) {
  const opts = FAMILIES.map(f =>
    `<option value="${f}" ${dashFilters.family===f?'selected':''}>${f}</option>`).join('');
  const statusOpts = Object.entries(STATUS_META).map(([k,m]) =>
    `<option value="${k}" ${dashFilters.status===k?'selected':''}>${m.dot} ${m.label}</option>`).join('');
  const diff = total !== shown ? `<span class="filter-results">${shown} de ${total} produtos</span>` : `<span class="filter-results">${total} produtos</span>`;
  return `<div class="filter-bar">
    <div class="filter-search">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input id="f-dash-search" type="text" placeholder="Buscar por código ou descrição…" value="${dashFilters.search.replace(/"/g,'&quot;')}">
    </div>
    <select class="filter-select" id="f-dash-family">
      <option value="">Todas as famílias</option>${opts}
    </select>
    <select class="filter-select" id="f-dash-status">
      <option value="">Todos os status</option>${statusOpts}
    </select>
    <label class="filter-toggle">
      <input type="checkbox" id="f-dash-zero" ${dashFilters.hideZeroSales?'checked':''}>
      Ocultar sem vendas
    </label>
    <label class="filter-toggle">
      <input type="checkbox" id="f-dash-sa" ${dashFilters.includeSA?'checked':''}>
      Incluir SA
    </label>
    ${diff}
  </div>`;
}

function buildTable(products) {
  const sorted = [...products].sort((a, b) => coverage(a) - coverage(b));
  const tHtml  = t => t.dir==='up'   ? `<span class="t-up"><i class="ti ti-trending-up" aria-hidden="true"></i> +${t.pct}%</span>`
                    : t.dir==='down' ? `<span class="t-down"><i class="ti ti-trending-down" aria-hidden="true"></i> -${t.pct}%</span>`
                    :                  `<span class="t-stable"><i class="ti ti-minus" aria-hidden="true"></i> Estável</span>`;
  const hasSA = dashFilters.includeSA && sorted.some(p => SA_MAP[p.code] !== undefined);
  const colCount = hasSA ? 9 : 8;
  const rows = sorted.length ? sorted.map(p => {
    const cov = coverage(p); const sm = STATUS_META[productStatus(p)];
    const pct = Number.isFinite(cov) ? Math.min(100, (cov/12)*100).toFixed(1) : 100;
    const saCell = hasSA ? `<td class="num-c" style="color:var(--muted)">${(p.stockSA||0) > 0 ? fmt.int(p.stockSA) : '—'}</td>` : '';
    return `<tr>
      <td><strong>${p.code}</strong></td>
      <td class="td-desc" title="${p.description}"><div>${p.description}</div></td>
      <td style="font-size:11px;color:var(--muted);text-align:center">${p.family||'—'}</td>
      <td class="num-c">${fmt.int(p.stock)}</td>
      ${saCell}
      <td class="num-c clickable-cell" onclick="openSalesModal('${p.code}')" title="Ver histórico de vendas">${fmt.int(avgConsumption(p))} un/mês</td>
      <td class="num-c">${fmt.cov(cov)}<div class="cov-bar"><div class="cov-fill" style="width:${pct}%;background:${sm.hex}"></div></div></td>
      <td><span class="badge ${sm.cls}">${sm.dot} ${sm.label}</span></td>
      <td>${tHtml(salesTrend(p))}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="${colCount}" class="empty">Nenhum produto encontrado com os filtros aplicados.</td></tr>`;
  const saHeader = hasSA ? `<th class="num-c">Estoque SA</th>` : '';
  return `<div class="tbl-wrap"><table aria-label="Estoque PA">
    <thead><tr>
      <th>Código</th><th>Descrição</th><th style="text-align:center">Família</th>
      <th class="num-c">Estoque PA</th>${saHeader}<th class="num-c">Consumo Médio</th>
      <th class="num-c">Cobertura</th><th>Status</th><th>Tendência 6m</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function getChartProducts(all) {
  switch (chartView) {
    case 'risco':   return all.filter(p => avgConsumption(p) > 0 && [STATUS.CRIT, STATUS.WARN].includes(productStatus(p))).sort((a,b) => coverage(a)-coverage(b));
    case 'excesso': return all.filter(p => avgConsumption(p) > 0 && productStatus(p) === STATUS.EXCESS).sort((a,b) => coverage(b)-coverage(a));
    default:        return all.filter(p => CURVA_A_FAMILIES.includes(p.family));
  }
}

function buildChartSection() {
  const views = [
    { key:'curva-a', label:'📊 Curva A' },
    { key:'risco',   label:'🔴 Maior Risco de Ruptura' },
    { key:'excesso', label:'🟣 Excesso de Estoque' },
  ];
  const btns = views.map(v =>
    `<button class="chart-view-btn${chartView===v.key?' active':''}" data-view="${v.key}">${v.label}</button>`
  ).join('');
  return `<div class="chart-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <p class="section-title" style="margin:0">Cobertura por produto (meses)</p>
      <div class="chart-view-tabs">${btns}</div>
    </div>
    <div class="chart-wrap"><canvas id="coverageChart" role="img" aria-label="Cobertura em meses por produto"></canvas></div>
    <div class="chart-legend" style="margin-top:12px">
      ${Object.values(STATUS_META).map(m=>`<span><span class="lgd-swatch" style="background:${m.hex}"></span>${m.dot} ${m.label}</span>`).join('')}
      <span class="lgd-line"><span class="lgd-dash" style="border-color:#3D9DAE"></span>Meta mínima (2m)</span>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════
   CHART
═══════════════════════════════════════════════ */
let chartInstance = null;
function mountChart(allProducts) {
  const canvas = document.getElementById('coverageChart');
  if (!canvas) return;
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const products = getChartProducts(allProducts);
  const sorted = [...products].sort((a,b) => coverage(a)-coverage(b));
  const covValues = sorted.map(p => Number.isFinite(coverage(p)) ? +coverage(p).toFixed(1) : 0);
  const maxCov = covValues.length ? Math.min(Math.max(...covValues) * 1.1, 24) : 12;
  chartInstance = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: sorted.map(p => p.code),
      datasets: [
        { label:'Cobertura (meses)', data: covValues,
          backgroundColor: sorted.map(p => STATUS_META[productStatus(p)].hex), borderRadius:4, borderSkipped:false },
        { type:'line', label:'Meta mínima', data: Array(sorted.length).fill(2),
          borderColor:'#3D9DAE', borderWidth:2, borderDash:[5,4], pointRadius:0, fill:false, tension:0 },
      ],
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y} meses`}} },
      scales:{
        y:{ beginAtZero:true, max: maxCov || 12, title:{display:true,text:'Meses',font:{size:11}} },
        x:{ ticks:{ font:{size:10}, maxRotation:45, autoSkip: sorted.length > 30 } },
      },
    },
  });
  // bind chart view buttons
  canvas.closest('.chart-card')?.querySelectorAll('.chart-view-btn').forEach(btn => {
    btn.addEventListener('click', () => { chartView = btn.dataset.view; renderDashboard(); });
  });
}

function exportCSV(products) {
  const header = ['Código','Descrição','Estoque (un)','Consumo médio/mês','Cobertura (meses)','Status'];
  const rows   = products.map(p => [p.code, `"${p.description}"`, p.stock, fmt.int(avgConsumption(p)), fmt.cov(coverage(p)), STATUS_META[productStatus(p)].label]);
  const csv    = [header,...rows].map(r=>r.join(',')).join('\n');
  const a = Object.assign(document.createElement('a'), { href:'data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv), download:`estoque_pa_${new Date().toISOString().slice(0,10)}.csv` });
  a.click();
}

async function generateShareFile() {
  try {
    showToast('Gerando arquivo…');
    const savedData = localStorage.getItem(STORAGE_KEY) || '[]';
    const html = await fetch('/index.html').then(r => r.text());
    const injection = `<script>try{localStorage.setItem('${STORAGE_KEY}',${JSON.stringify(savedData)})}catch(e){}<\/script>`;
    const modified = html.replace('</head>', injection + '</head>');
    const blob = new Blob([modified], { type: 'text/html;charset=utf-8' });
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob),
      download: 'painel-estoque-msb.html'
    });
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('Arquivo gerado! Envie o painel-estoque-msb.html para seu gestor.');
  } catch(e) {
    showToast('Erro ao gerar arquivo: ' + e.message, 'err');
  }
}

function applyFilters(products) {
  let list = products;
  const q = dashFilters.search.trim().toLowerCase();
  if (q)                      list = list.filter(p => p.code.toLowerCase().includes(q) || p.description.toLowerCase().includes(q));
  if (dashFilters.family)     list = list.filter(p => p.family === dashFilters.family);
  if (dashFilters.status)     list = list.filter(p => productStatus(p) === dashFilters.status);
  if (dashFilters.hideZeroSales) list = list.filter(p => avgConsumption(p) > 0);
  return list;
}

function renderProductList() {

  list.innerHTML = products.map(p => {
    const sm = STATUS_META[productStatus(p)];
    return `<div class="list-item">
      <div class="li-body">
        <span class="li-code">${p.code}</span>
        <span class="li-desc">${p.description}</span>
        <span class="li-meta">Estoque: ${fmt.int(p.stock)} un &nbsp;·&nbsp; Consumo: ${fmt.int(avgConsumption(p))} un/mês &nbsp;·&nbsp; Cobertura: ${fmt.cov(coverage(p))}</span>
      </div>

  }).join('');

    if (btn.dataset.action === 'edit') onEditProduct(btn.dataset.code);
    if (btn.dataset.action === 'del')  onDeleteProduct(btn.dataset.code);
  });
}

function bindEditorEvents() {
  document.getElementById('btn-new-product')?.addEventListener('click', () => openProductModal());
  document.getElementById('btn-reset')?.addEventListener('click', () => {
    if (confirm('Restaurar dados de exemplo e apagar todos os produtos?')) { state.reset(); clearForm(); }

  document.getElementById('fi-stock')?.addEventListener('change', e => handleStockFile(e.target.files[0]));
  document.getElementById('btn-stock-cancel')?.addEventListener('click', cancelStockImport);
  document.getElementById('btn-stock-apply')?.addEventListener('click', applyStockImport);

  document.getElementById('btn-lots-apply')?.addEventListener('click', applyLotsImport);

function setupDragDrop(dzId, fiId) {
  const dz = document.getElementById(dzId);
  const fi = document.getElementById(fiId);
  if (!dz || !fi) return;
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const file = e.dataTransfer?.files[0];
    if (!file) return;
    if (fiId === 'fi-stock')      handleStockFile(file);
    else if (fiId === 'fi-lots')  handleLotsFile(file);
    else                          handleSalesFile(file);
  });
}

/* ── Stock import handlers (PA + SA + Materiais, tudo do mesmo arquivo) ── */
async function handleStockFile(file) {
  if (!file) return;
  showLoading('Lendo arquivo de estoque…');
  try {
    const rows = await readExcelFile(file);
    const { items, lotStock, hasLot, skipped } = aggregateStock(rows);
    if (!items.length) { showToast('Nenhum item encontrado. Verifique as colunas do arquivo.', 'err'); return; }
    const memsCodeSet = new Set(memsItems.map(i => i.code.toUpperCase()));
    const paCodeSet   = new Set(state.getAll().map(p => p.code.toUpperCase()));
    // Nós da estrutura que não vivem em nenhum outro cadastro (ex: PIs) — estoque vai para memsBomStock
    const bomNodeSet  = new Set(memsBom.flatMap(e => [String(e.code).toUpperCase(), String(e.parent).toUpperCase()]));
    const paItems = [], saItems = [], memsMatched = [], bomMatched = [];
    for (const item of items) {
      const code = String(item.code).toUpperCase().trim();
      const paCode = SA_REVERSE_MAP[code];
      if (paCode) saItems.push({ ...item, saCode: code, code: String(paCode).toUpperCase().trim() });
      else if (memsCodeSet.has(code)) memsMatched.push({ ...item, code });
      else if (!paCodeSet.has(code) && bomNodeSet.has(code)) bomMatched.push({ ...item, code });
      else paItems.push({ ...item, code }); // normalise to uppercase
    }
    pendingStock = { paItems, saItems, memsMatched, bomMatched, lotStock, hasLot, filename: file.name, skipped, totalRows: rows.length };
    renderStockPreview();
  } catch(err) {
    showToast('Erro ao ler o arquivo: ' + err.message, 'err');
  } finally {
    hideLoading();
  }
}

function renderStockPreview() {
  if (!pendingStock) return;
  const { paItems, saItems, memsMatched, bomMatched = [], filename, skipped, totalRows } = pendingStock;
  const existing = new Set(state.getAll().map(p => p.code));
  const knownPA = paItems.filter(i => existing.has(i.code.toUpperCase()));
  const knownSA = saItems.filter(i => existing.has(i.code.toUpperCase()));
  const ignoredCount = (paItems.length - knownPA.length) + (saItems.length - knownSA.length);
  const prev = document.getElementById('prev-stock');
  const info = document.getElementById('prev-stock-info');
  const body = document.getElementById('prev-stock-body');
  const count = document.getElementById('prev-stock-count');
  prev.classList.add('visible');
  info.innerHTML = `<i class="ti ti-file" aria-hidden="true"></i> <strong>${filename}</strong> · ${totalRows} linhas · ${skipped + ignoredCount} ignoradas`;
  body.innerHTML = [
    ...knownPA.map(item => `<tr>
      <td><strong>${item.code}</strong></td>
      <td>${item.description || '—'}</td>
      <td style="text-align:right">${fmt.int(item.stock)}</td>
      <td><span class="badge b-upd">Estoque PA</span></td>
    </tr>`),
    ...knownSA.map(item => `<tr>
      <td><strong>${item.code}</strong></td>
      <td style="color:var(--muted);font-size:11px">${item.saCode}</td>
      <td style="text-align:right">${fmt.int(item.stock)}</td>
      <td><span class="badge b-high">Estoque SA</span></td>
    </tr>`),
    ...memsMatched.map(item => `<tr>
      <td><strong>${item.code}</strong></td>
      <td>${item.description || '—'}</td>
      <td style="text-align:right">${fmt.int(item.stock)}</td>
      <td><span class="badge" style="background:var(--accent-bg);color:var(--accent)">Material</span></td>
    </tr>`),
    ...bomMatched.map(item => `<tr>
      <td><strong>${item.code}</strong></td>
      <td>${item.description || '—'}</td>
      <td style="text-align:right">${fmt.int(item.stock)}</td>
      <td><span class="badge b-high">Estrutura (PI)</span></td>
    </tr>`),
  ].join('');
  count.textContent = `${knownPA.length} PA · ${knownSA.length} SA · ${memsMatched.length} materiais${bomMatched.length ? ` · ${bomMatched.length} estrutura` : ''} · ${ignoredCount} ignorados`;
}

function cancelStockImport() {
  pendingStock = null;
  const prev = document.getElementById('prev-stock');
  if (prev) prev.classList.remove('visible');
  const fi = document.getElementById('fi-stock');
  if (fi) fi.value = '';
}

async function applyStockImport() {
  if (!pendingStock) return;
  if (!isLoggedIn()) { showToast('Faça login antes de importar o estoque.', 'err'); return; }
  showLoading('Salvando estoque…');
  try {
    const { paItems, saItems, memsMatched, bomMatched = [] } = pendingStock;
    if (paItems.length) await state.applyStockImport(paItems);
    if (saItems.length) await state.applyStockSAImport(saItems);
    if (memsMatched.length) {
      memsItems.forEach(i => { i.stock = 0; });
      memsMatched.forEach(item => {
        const existing = memsItems.find(i => i.code.toUpperCase() === item.code);
        if (existing) existing.stock = Math.max(0, Math.round(item.stock));
      });
      await saveMemsItems();
      memsMeta.stockUpdatedAt = new Date().toISOString();
      await saveMemsMeta();
    }
    memsBomStock = {};
    bomMatched.forEach(item => { memsBomStock[item.code] = Math.max(0, Math.round(item.stock)); });
    await saveMemsBomStock();
    // saldo por lote (pra cruzar com a validade na aba Alertas) — só se a planilha
    // trouxe coluna de lote; senão preserva o que já havia pra não zerar à toa
    if (pendingStock.hasLot) {
      paLotStock = pendingStock.lotStock || {};
      await savePaLotStock();
    }
    showToast(`Estoque atualizado: ${paItems.length} PA · ${saItems.length} SA · ${memsMatched.length} materiais${bomMatched.length ? ` · ${bomMatched.length} estrutura` : ''}`);
    cancelStockImport();
  } catch(err) {
    showToast('Erro ao salvar estoque: ' + err.message, 'err');
  } finally {
    hideLoading();
  }
}

/* ── Sales import handlers ── */
async function handleSalesFile(file) {
  if (!file) return;
  showLoading('Lendo arquivo de vendas…');
  try {
    const rows = await readExcelFile(file);
    const { salesMap, skipped } = aggregateSales(rows);
    const codes = Object.keys(salesMap);
    if (!codes.length) { showToast('Nenhuma saída encontrada. Verifique se a coluna "Saída" está preenchida.', 'err'); return; }
    // Detect all months present in the data
    const monthSet = new Set();
    Object.values(salesMap).forEach(mData => Object.keys(mData).forEach(mk => monthSet.add(mk)));
    const months = [...monthSet].sort();
    pendingSales = { salesMap, months, filename: file.name, skipped, totalRows: rows.length };
    renderSalesPreview();
  } catch(err) {
    showToast('Erro ao ler o arquivo: ' + err.message, 'err');
  } finally {
    hideLoading();
  }
}

function renderSalesPreview() {
  if (!pendingSales) return;
  const { salesMap, months, filename, skipped, totalRows } = pendingSales;
  const prev  = document.getElementById('prev-sales');
  const info  = document.getElementById('prev-sales-info');
  const head  = document.getElementById('prev-sales-head');
  const body  = document.getElementById('prev-sales-body');
  const count = document.getElementById('prev-sales-count');
  prev.classList.add('visible');
  info.innerHTML = `<i class="ti ti-file" aria-hidden="true"></i> <strong>${filename}</strong> · ${totalRows} linhas · ${skipped} ignoradas · Meses: ${months.map(fmtMonthKey).join(', ')}`;
  head.innerHTML = `<tr><th>Código</th>${months.map(mk => `<th style="text-align:right">${fmtMonthKey(mk)}</th>`).join('')}</tr>`;
  const existing = new Set(state.getAll().map(p => p.code));
  const knownEntries = Object.entries(salesMap).filter(([code]) => existing.has(code.toUpperCase()));
  const ignoredSales = Object.keys(salesMap).length - knownEntries.length;
  body.innerHTML = knownEntries.map(([code, mData]) =>
    `<tr><td><strong>${code}</strong></td>${months.map(mk => `<td style="text-align:right">${fmt.int(mData[mk] || 0)}</td>`).join('')}</tr>`
  ).join('');
  count.textContent = `${knownEntries.length} atualizações${ignoredSales > 0 ? ` · ${ignoredSales} ignorados` : ''} · ${months.length} ${months.length===1?'mês':'meses'}`;
}

function cancelSalesImport() {
  pendingSales = null;
  const prev = document.getElementById('prev-sales');
  if (prev) prev.classList.remove('visible');
  const fi = document.getElementById('fi-sales');
  if (fi) fi.value = '';
}

function applySalesImport() {
  if (!pendingSales) return;
  showLoading('Atualizando vendas…');
  setTimeout(() => {
    state.applySalesImport(pendingSales.salesMap);
    const n = Object.keys(pendingSales.salesMap).length;
    const m = pendingSales.months.map(fmtMonthKey).join(', ');
    hideLoading();
    showToast(`Vendas atualizadas: ${n} produtos · ${m}`);
    cancelSalesImport();
  }, 0);
}

/* ── Manual form ── */
function onSaveManual() {
  const errEl  = document.getElementById('form-error');
  errEl.textContent = '';
  const code   = document.getElementById('f-code')?.value.trim();
  const desc   = document.getElementById('f-desc')?.value.trim();
  if (!code) { errEl.textContent = 'Informe o código do produto.'; return; }
  if (!desc) { errEl.textContent = 'Informe a descrição.'; return; }

  if (!editingCode && modalKind === 'material') {
    const upperCode = code.toUpperCase();
    if (memsItems.some(i => i.code.toUpperCase() === upperCode)) {
      errEl.textContent = 'Já existe um material com esse código.'; return;
    }
    const type     = document.getElementById('f-mtype')?.value || 'MP';
    const family   = document.getElementById('f-mfamily')?.value.trim() || '';
    const supplier = document.getElementById('f-msupplier')?.value.trim() || '';
    const origin   = document.getElementById('f-morigin')?.value.trim() || '';
    const leadRaw  = parseFloat(document.getElementById('f-mlead')?.value);
    memsItems.push({
      code: upperCode, desc, type, family, supplier, origin,
      leadTime: isNaN(leadRaw) ? null : Math.ceil(leadRaw),
      stock: 0, avgForecast: 0, avgConsumption: 0, inTransit: 0, consumoHistory: {}, forecastHistory: {}, transitEntries: [],
    });
    saveMemsItems();
    closeProductModal();
    showToast(`Material ${upperCode} cadastrado.`);
    return;
  }

  const family = document.getElementById('f-family')?.value || '';
  const existing = state.getByCode(code);
  state.addOrUpdate({ code, description: desc, family, stock: existing?.stock ?? 0, salesHistory: existing?.salesHistory ?? {} });
  closeProductModal();
  showToast(`Produto ${code.toUpperCase()} salvo.`);
}

function onEditProduct(code) {
  openProductModal(code);
}

function onDeleteProduct(code) {
  if (!confirm(`Remover ${code}?`)) return;
  state.remove(code);
  if (editingCode === code) clearForm();
  showToast(`Produto ${code} removido.`);
}

function clearForm() {
  closeProductModal();
}

let activeTab = 'dashboard';

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const a = btn.dataset.tab === tab;
    btn.classList.toggle('active', a);
    btn.setAttribute('aria-selected', String(a));
  });
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  if (tab === 'dashboard')     renderDashboard();
  else if (tab === 'mems')     renderMems();
  else if (tab === 'alertas')  renderAlertas();
  else                         renderEditor();
}

document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
state.subscribe(() => {
  if (activeTab === 'dashboard')     renderDashboard();
  else if (activeTab === 'alertas')  renderAlertas();
  else renderProductList();
});

/* ── Estrutura de produtos (cobertura em cadeia) ──────────────────────────
   Cada relação da estrutura diz: `code` é consumido por `parent` na proporção
   `qty` (unidades de code por 1 unidade de parent). O estoque dos níveis
   seguintes (PI/SA/PA) "embute" unidades do material que ainda não precisam
   ser repostas — a cobertura em cadeia soma esse equivalente ao estoque próprio.

   DECISÕES DE NEGÓCIO (histórico — não reverter sem reler o porquê):

   1. Cobertura em cadeia = (estoque próprio + soma de TODO o estoque embutido em
      TODOS os ramos) ÷ consumo histórico da PRÓPRIA MP — não pelo consumo de cada
      PA. Já testamos dividir pelo consumo do PA (achando que seria mais preciso
      por ramo), mas o usuário pediu para reverter: a mesma MP é consumida por
      vários PAs, e o consumo histórico da MP já reflete a demanda agregada real
      de todos eles — não precisa reconstruir isso por fator de uso, que depende
      da precisão da planilha de Estrutura.

   2. Consequência do item 1: a soma agregada pode "esconder" um ramo específico
      zerado atrás de outros ramos bem servidos. Por isso existe memsDryBranches:
      cada ramo é avaliado sozinho (estoque próprio + estoque do caminho daquele
      ramo, dividido pelo consumo do PA daquele ramo) e força status Crítico
      quando um produto com vendas fica sem atendimento — independente do que a
      soma agregada diga. Isso só roda quando a MP alimenta 2+ produtos finais
      (com 1 só, a soma agregada já É aquele ramo, nada pra esconder).

   3. Antes de confirmar um ramo em risco, checamos se já existe compra em
      trânsito para a MP e se a previsão de chegada é ANTES da ruptura daquele
      ramo (memsNextArrival vs. data de ruptura projetada). Se chega a tempo,
      não é crítico — já está coberto por uma compra em andamento.

   4. "Compra pendente" (memsNeedsReorder) compara a cobertura em cadeia (item 1)
      com o lead time da MP — não com o estoque físico isolado. Cobertura ≤ lead
      time = pedindo hoje, chegaria em cima da hora ou atrasado.
*/
function memsBomParents(code) {
  const upper = String(code).toUpperCase();
  const seen = {};
  memsBom.forEach(e => {
    if (String(e.code).toUpperCase() !== upper) return;
    const p = String(e.parent).toUpperCase();
    if (!seen[p]) seen[p] = { parent: p, qty: e.qty || 1 };
  });
  return Object.values(seen);
}
function memsHasParents(code) {
  const upper = String(code).toUpperCase();
  return memsBom.some(e => String(e.code).toUpperCase() === upper);
}
// Estoque de um nó da estrutura, onde quer que ele viva: materiais (memsItems),
// SA (estoque secundário do PA), PA (painel de indicadores) ou capturado no import (PIs)
function memsNodeStock(code) {
  const upper = String(code).toUpperCase();
  const mat = memsItems.find(i => i.code.toUpperCase() === upper);
  if (mat) return mat.stock || 0;
  const paFromSA = SA_REVERSE_MAP[upper];
  if (paFromSA) return state.getByCode(paFromSA)?.stockSA || 0;
  const pa = state.getByCode(upper);
  if (pa) return pa.stock || 0;
  return memsBomStock[upper] || 0;
}
// Mapa nó → fator (unidades do item embutidas em 1 unidade do nó), subindo a cadeia toda.
// Caminhos convergentes somam fatores; guarda anti-ciclo por limite de iterações.
function memsDownstreamFactors(code) {
  const factors = {};
  const queue = memsBomParents(code).map(p => ({ node: p.parent, factor: p.qty }));
  let guard = 0;
  while (queue.length && guard++ < 5000) {
    const { node, factor } = queue.shift();
    factors[node] = (factors[node] || 0) + factor;
    memsBomParents(node).forEach(p => queue.push({ node: p.parent, factor: factor * p.qty }));
  }
  return factors;
}
// Unidades do item já embutidas nos estoques dos níveis seguintes: soma o estoque de
// TODOS os nós da cadeia (todos os ramos), cada um convertido pela quantidade de uso
// acumulada até esse nó. Por opção do usuário, essa soma é dividida pelo consumo
// histórico da própria MP (não pelo consumo de cada PA) — a MP é consumida por mais
// de um produto final, e o consumo dela já reflete a demanda agregada de todos eles.
function memsEmbeddedStock(item) {
  if (!memsBom.length) return 0;
  const factors = memsDownstreamFactors(item.code);
  let total = 0;
  for (const [node, factor] of Object.entries(factors)) total += memsNodeStock(node) * factor;
  return total;
}
// Caminha da item até o produto final `f`, acumulando o fator de uso e o estoque
// (já convertido em unidades do item) de cada nó do caminho. Usado pela análise de
// ramo em risco (memsDryBranches) para avaliar cada ramo individualmente — a soma
// agregada acima não pega quando UM ramo específico fica sem atendimento.
function memsWalkBranch(item, f, parents) {
  let node = item.code.toUpperCase(), factor = 1, pathStock = 0, guard = 0;
  while (guard++ < 30) {
    const edge = parents.get(node);
    if (!edge || edge.parent === '-') break;
    factor *= edge.qty || 1;
    pathStock += memsNodeStock(edge.parent) * factor;
    if (edge.parent === f) break;
    node = edge.parent;
  }
  return { factor, pathStock };
}
// Estoque efetivo = próprio + embutido na cadeia (soma de todos os ramos)
function memsEffectiveStock(item) {
  return (item.stock || 0) + memsEmbeddedStock(item);
}

/* ── Ramos em risco ───────────────────────────────────────────────────────
   Cada ramo (item → … → produto final) é avaliado sozinho, não pela soma
   agregada da cadeia: um ramo pode estar em risco mesmo que outro ramo do
   mesmo material esteja bem servido (os estoques não se emprestam entre si).
   Para o ramo, calculamos: estoque próprio do item + o que já está pronto
   nos nós do caminho (convertido pela quantidade de uso acumulada), dividido
   pelo consumo daquele produto final específico (não o consumo do item).
   "Seco" = já zerado. "Em risco" = zerado OU não dá pra durar até o lead
   time da reposição do material — mesmo estoque baixo, mas não zero. */
let _bomIdx = null; // índices derivados de memsBom; invalidado quando a estrutura muda
function memsBomIndex() {
  if (_bomIdx) return _bomIdx;
  const byFinal = new Map();      // final -> Map(código -> {parent, qty})
  const finalsByCode = new Map(); // código -> Set(produtos finais que o consomem)
  memsBom.forEach(e => {
    const code = String(e.code).toUpperCase(), parent = String(e.parent).toUpperCase(), final = String(e.final || '').toUpperCase();
    if (!final) return;
    if (!byFinal.has(final)) byFinal.set(final, new Map());
    byFinal.get(final).set(code, { parent, qty: e.qty || 1 });
    if (!finalsByCode.has(code)) finalsByCode.set(code, new Set());
    finalsByCode.get(code).add(final);
  });
  _bomIdx = { byFinal, finalsByCode };
  return _bomIdx;
}
// Detalhe cru de cada ramo (produto final que consome o item) — usado tanto pelo
// alerta de Compra pendente (memsDryBranches) quanto pelo de Antecipação
// (memsAnticipationBranches). Com 1 só produto final não há o que "esconder" atrás
// da soma agregada, então retorna vazio (mesma regra dos dois alertas).
function memsAllBranchDetails(item) {
  if (!memsBom.length) return [];
  const { byFinal, finalsByCode } = memsBomIndex();
  const finals = finalsByCode.get(item.code.toUpperCase());
  if (!finals || finals.size <= 1) return [];
  return [...finals].map(f => {
    const parents = byFinal.get(f);
    const { factor, pathStock } = memsWalkBranch(item, f, parents);
    const available = (item.stock || 0) + pathStock;
    const pa = state.getByCode(f);
    const hasSales = !!pa && avgConsumption(pa) > 0;
    const branchConsumption = pa ? avgConsumption(pa) * factor : 0; // consumo desse PA, em unidades do item
    const monthsLeft = branchConsumption > 0 ? available / branchConsumption : Infinity;
    return { final: f, available, hasSales, branchConsumption, monthsLeft, dry: available === 0 };
  });
}
function memsDryBranches(item) {
  const branches = memsAllBranchDetails(item);
  if (!branches.length) return [];
  const nextArrival = memsNextArrival(item); // já tem compra em trânsito? quando chega?
  const out = [];
  for (const b of branches) {
    // Sem lead time cadastrado não dá pra avaliar "insuficiente antes da reposição" —
    // nesse caso só sinalizamos o caso extremo (zerado), pra não inventar urgência sem base.
    let atRisk = b.dry || (item.leadTime ? b.monthsLeft < item.leadTime : false);
    // Antes de confirmar o risco, checa se já existe compra em trânsito e se ela chega
    // a tempo: se a previsão de chegada for antes (ou no mesmo dia) da ruptura desse
    // ramo, o material já está coberto e não é crítico.
    if (atRisk && nextArrival && Number.isFinite(b.monthsLeft)) {
      const ruptureDate = new Date(Date.now() + b.monthsLeft * 30.44 * 86400000);
      if (nextArrival <= ruptureDate) atRisk = false;
    }
    if (!atRisk) continue;
    out.push({ final: b.final, hasSales: b.hasSales, dry: b.dry, monthsLeft: Number.isFinite(b.monthsLeft) ? b.monthsLeft : null });
  }
  return out;
}
function memsDrySalesBranches(item) { return memsDryBranches(item).filter(b => b.hasSales); }
// Necessário antecipação por ramo: mesmo quando o item não está em Compra pendente
// (a cobertura agregada cobre o lead time numa compra nova), um ramo específico pode
// esgotar antes do embarque JÁ EM TRÂNSITO chegar — o mesmo problema de "soma
// agregada esconde o ramo ruim" que já resolvemos pra Compra pendente, só que aqui
// comparando contra a data de chegada em vez do lead time.
function memsAnticipationBranches(item) {
  if (memsNeedsReorder(item)) return []; // já é compra pendente, não duplica alerta
  const branches = memsAllBranchDetails(item);
  if (!branches.length) return [];
  const nextArrival = memsNextArrival(item);
  if (!nextArrival) return [];
  const out = [];
  for (const b of branches) {
    if (b.branchConsumption <= 0 || !Number.isFinite(b.monthsLeft)) continue; // sem venda medida, sem sinal confiável
    const stockoutDate = new Date(Date.now() + b.monthsLeft * 30.44 * 86400000);
    if (stockoutDate < nextArrival) out.push({ final: b.final, hasSales: b.hasSales, monthsLeft: b.monthsLeft });
  }
  return out;
}
function memsAnticipationSalesBranches(item) { return memsAnticipationBranches(item).filter(b => b.hasSales); }

function memsStatus(item) {
  // Ramo em risco (zerado, ou insuficiente até a reposição do material) com vendas
  // → Crítico, independente do que a soma agregada da cadeia diga
  if (memsDrySalesBranches(item).length) return STATUS.CRIT;
  const stock = (item.stock||0), cons = memsEffectiveConsumption(item);
  if (stock === 0 && cons === 0) return STATUS.NOGIRO;
  if (cons === 0) return STATUS.EXCESS;
  const cov = memsCoverage(item);
  if (cov > 12) return STATUS.EXCESS;
  if (cov >= 6)  return STATUS.HIGH;
  if (cov >= 2)  return STATUS.OK;
  if (cov >= 1)  return STATUS.WARN;
  return STATUS.CRIT;
}
// Cobertura única: em cadeia quando o item é consumido por algum produto,
// senão baseada só no consumo próprio. O consumo usado é o "efetivo" (real por
// padrão, ou só forecast com o toggle memsUseForecast ligado).
function memsCoverage(item) {
  const cons = memsEffectiveConsumption(item);
  if (cons === 0) return Infinity;
  return memsEffectiveStock(item) / cons;
}
// Cobertura própria: só o estoque físico do item, sem a cadeia — responde
// "a produção consegue rodar amanhã?", enquanto a cadeia responde "preciso comprar?"
function memsOwnCoverage(item) {
  const cons = memsEffectiveConsumption(item);
  if (cons === 0) return Infinity;
  return (item.stock || 0) / cons;
}
// Cobertura Pior Caso: SEMPRE usa o pior caso (forecast x real), independente do
// toggle memsUseForecast — é a referência conservadora permanente, só aparece no
// export (CSV), não como coluna da tabela.
function memsWorstCoverage(item) {
  const wc = memsForecastWorstCase(item);
  if (wc === 0) return Infinity;
  return memsEffectiveStock(item) / wc;
}
// % do lead time coberto pelo estoque efetivo + o que já está em trânsito (se houver) —
// null quando não há lead time cadastrado
function memsLeadCoveragePct(item) {
  if (!item.leadTime) return null;
  const cons = memsEffectiveConsumption(item);
  if (cons <= 0) return Infinity;
  const effectiveStock = memsEffectiveStock(item) + (item.inTransit || 0);
  return (effectiveStock / cons) / item.leadTime;
}
// Compra pendente:
//  (1) sem compra em trânsito — pedindo hoje, chegaria bem em cima da hora ou já atrasado
//      (cobertura do estoque atual <= lead time)
//  (2) com compra em trânsito — mesmo somando estoque + trânsito, não dá pra durar o lead time todo
//      (cobertura combinada < lead time)
function memsNeedsReorder(item) {
  const pct = memsLeadCoveragePct(item);
  if (pct == null) return false;
  const hasTransit = (item.inTransit || 0) > 0;
  return hasTransit ? pct < 1 : pct <= 1;
}
function memsPurchaseQueue() {
  return memsItems.filter(memsNeedsReorder).sort((a,b) => memsLeadCoveragePct(a) - memsLeadCoveragePct(b));
}
// Data prevista de ruptura de estoque (efetivo, incluindo cadeia), assumindo consumo constante
function memsStockoutDate(item) {
  const cons = memsEffectiveConsumption(item);
  if (cons <= 0) return null;
  const monthsLeft = memsEffectiveStock(item) / cons;
  return new Date(Date.now() + monthsLeft * 30.44 * 86400000);
}
// Data do primeiro recebimento entre os embarques em trânsito do material.
// arrivalDate vira string ISO depois do JSON.stringify/parse do localStorage,
// então aceitamos tanto Date quanto string.
function memsNextArrival(item) {
  const dates = (item.transitEntries || [])
    .map(e => e.arrivalDate ? new Date(e.arrivalDate) : null)
    .filter(d => d instanceof Date && !isNaN(d));
  return dates.length ? new Date(Math.min(...dates.map(d => d.getTime()))) : null;
}
// Necessário antecipação: vai acabar antes do primeiro recebimento já em trânsito
// (só faz sentido para itens que ainda não estão na fila de compra pendente)
function memsNeedsAnticipation(item) {
  if (memsNeedsReorder(item)) return false;
  if (memsAnticipationSalesBranches(item).length) return true;
  const arrival  = memsNextArrival(item);
  const stockout = memsStockoutDate(item);
  if (!arrival || !stockout) return false;
  return stockout < arrival;
}
function memsAnticipationQueue() {
  return memsItems.filter(memsNeedsAnticipation).sort((a,b) => memsStockoutDate(a) - memsStockoutDate(b));
}
function fmtMemsTs(iso) {
  if (!iso) return null;
  return new Date(iso).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
function exportMemsCSV(items) {
  const header = ['Código','Descrição','Tipo','Família','Fornecedor','Origem','Lead Time (meses)','Estoque','Consumo Médio/mês','Média Forecast/mês','Pior Caso/mês','Em Trânsito','Cobertura (m)','Cobertura própria (m)','Cobertura Pior Caso (m)','Status'];
  const rows = items.map(i => {
    const cov = memsCoverage(i), covOwn = memsOwnCoverage(i), covW = memsWorstCoverage(i);
    return [
      i.code, `"${i.desc}"`, i.type||'', `"${i.family||''}"`, `"${i.supplier||''}"`, i.origin||'',
      i.leadTime ?? '', i.stock||0, i.avgConsumption||0, i.avgForecast||0, memsForecastWorstCase(i), i.inTransit||0,
      Number.isFinite(cov) ? cov.toFixed(1) : '', Number.isFinite(covOwn) ? covOwn.toFixed(1) : '', Number.isFinite(covW) ? covW.toFixed(1) : '',
      STATUS_META[memsStatus(i)].label,
    ].join(',');
  });
  const csv = [header.join(','), ...rows].join('\n');
  const a = Object.assign(document.createElement('a'), { href:'data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv), download:`materiais_${new Date().toISOString().slice(0,10)}.csv` });
  a.click();
}

// ── CONSUMO & FORECAST (planilha de cobertura da PCP) ─────────────────────
// Parser genérico da planilha de cobertura — cada import lê só as colunas que lhe cabem
function parseCoverageSheet(ws, colSpecs) {
  const data = XLSX.utils.sheet_to_json(ws, { defval: '' });
  if (!data.length) return [];
  const keys = Object.keys(data[0]);
  const col = (...cands) => keys.find(k => cands.some(c => k.toLowerCase().includes(c.toLowerCase())));
  const firstKey = keys[0];
  const hasPA = firstKey && (firstKey.toLowerCase() === 'pa' || firstKey.toLowerCase().startsWith('pa '));
  const colCode = hasPA ? keys[1] : (col('código','codigo','cód') || keys[0]);
  const num = v => { const n = parseFloat(String(v||'0').replace(',','.')); return isNaN(n) ? 0 : n; };
  const resolved = {};
  for (const [field, cands] of Object.entries(colSpecs)) resolved[field] = col(...cands);
  return data.map(row => {
    const out = { code: String(row[colCode]||'').trim().toUpperCase() };
    for (const field of Object.keys(colSpecs)) out[field] = num(row[resolved[field]]);
    return out;
  });
}

function importCoverageFile(file, colSpecs) {
  return file.arrayBuffer().then(buf => {
    const wb = XLSX.read(buf, { type: 'array' });
    const codeSet = new Set(memsItems.map(i => i.code.toUpperCase()));
    let imported = [];
    if (wb.SheetNames.includes('MP')) imported = imported.concat(parseCoverageSheet(wb.Sheets['MP'], colSpecs));
    const memsSheet = wb.SheetNames.find(n => n === 'ME e MS' || n === 'ME' || n === 'MS');
    if (memsSheet) imported = imported.concat(parseCoverageSheet(wb.Sheets[memsSheet], colSpecs));
    if (!imported.length && wb.SheetNames.length) imported = parseCoverageSheet(wb.Sheets[wb.SheetNames[0]], colSpecs);
    return imported.filter(i => i.code && codeSet.has(i.code));
  });
}

async function handleMemsConsumoFile(file) {
  showLoading('Lendo arquivo de consumo…');
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array', cellDates: true });
    const requiredCols = [COL_SALES.code, COL_SALES.date, COL_SALES.exit, COL_SALES.qty];
    // A planilha bruta do Dynamics às vezes vem com uma aba extra (ex: tabela dinâmica) antes
    // da aba com os dados de verdade — por isso procuramos em todas as abas, não só na primeira.
    let rawRows = null;
    for (const sheetName of wb.SheetNames) {
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval: '' });
      if (rows.length && requiredCols.every(h => Object.keys(rows[0]).includes(h))) {
        rawRows = rows;
        break;
      }
    }

    if (rawRows) {
      const { consumoMap, skipped } = aggregateMemsConsumo(rawRows);
      const codeSet = new Set(memsItems.map(i => i.code.toUpperCase()));
      const items = Object.entries(consumoMap).filter(([code]) => codeSet.has(code));
      const months = [...new Set(items.flatMap(([, mData]) => Object.keys(mData)))].sort();
      pendingMemsConsumo = { items, months, filename: file.name, skipped, totalRows: rawRows.length, raw: true };
      renderMemsConsumoRawPreview('mems-consumo-prev', pendingMemsConsumo);
      toggleMemsUpdateApply(items.length > 0, applyMemsConsumoImport);
    } else {
      const imported = await importCoverageFile(file, {
        avgConsumption: ['média real','media real','real'],
      });
      pendingMemsConsumo = { items: imported, filename: file.name, raw: false };
      renderCoveragePreview('mems-consumo-prev', imported, file.name);
      toggleMemsUpdateApply(imported.length > 0, applyMemsConsumoImport);
    }
  } catch(err) {
    showToast('Erro ao ler arquivo: ' + err.message, 'err');
  } finally {
    hideLoading();
  }
}
