// ── TRÂNSITO (planilha de follow-up de compras / embarques) ───────────────
// O relatório vem com linhas de título/timestamp antes da tabela de verdade, então
// procuramos a linha que contém "Código do produto" para achar onde o cabeçalho começa.
function parseTransitSheet(ws) {
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
  const headerRowIdx = rows.findIndex(r => r.some(c => String(c).trim() === 'Código do produto'));
  if (headerRowIdx === -1) return [];
  const header = rows[headerRowIdx].map(h => String(h).trim());
  const iCode     = header.indexOf('Código do produto');
  const iQty      = header.indexOf('QTDE');
  const iEmbarque = header.indexOf('Embarque');
  const iArrival  = header.indexOf('Prev. Chegada PO');
  if (iCode === -1 || iQty === -1) return [];
  const out = [];
  for (let r = headerRowIdx + 1; r < rows.length; r++) {
    const row  = rows[r];
    const code = String(row[iCode] || '').trim().toUpperCase();
    if (!code) continue;
    const qty = toNum(row[iQty]);
    if (!qty) continue;
    out.push({
      code,
      qty,
      embarque: iEmbarque !== -1 ? String(row[iEmbarque] || '').trim() : '',
      arrivalDate: iArrival !== -1 ? toDate(row[iArrival]) : null,
    });
  }
  return out;
}

function memsFileHeaderPreview(wb) {
  return wb.SheetNames.map(name => {
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[name], { header: 1, defval: '' });
    const headerRow = rows.find(r => r.some(c => String(c).trim() !== '')) || [];
    const headers = headerRow.map(c => String(c).trim()).filter(Boolean).slice(0, 12);
    return `<strong>${name}</strong>: ${headers.length ? headers.join(', ') : '(aba vazia)'}`;
  }).join('<br>');
}

async function handleMemsTransitoFile(file) {

// ── ESTRUTURA (consumo por produto: componente → próximo uso, com quantidades) ──
// O cabeçalho pode não estar na primeira linha — procuramos a linha "Cód. Produto".
function parseBomSheet(ws) {
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
  const headerRowIdx = rows.findIndex(r => r.some(c => String(c).trim() === 'Cód. Produto'));
  if (headerRowIdx === -1) return [];
  const header = rows[headerRowIdx].map(h => String(h).trim());
  const iCode   = header.indexOf('Cód. Produto');
  const iFinal  = header.indexOf('Cód. Final');
  const iParent = header.indexOf('Cód. Próximo Uso');
  const iQty    = header.indexOf('Uso');
  const iUnit   = header.indexOf('Unidade');
  if (iCode === -1 || iParent === -1) return [];
  const out = [];
  for (let r = headerRowIdx + 1; r < rows.length; r++) {
    const row    = rows[r];
    const code   = String(row[iCode] || '').trim().toUpperCase();
    const parent = String(row[iParent] || '').trim().toUpperCase();
    if (!code || !parent || parent === '-') continue; // raiz (o próprio PA) não gera relação
    out.push({
      code, parent,
      final: iFinal !== -1 ? String(row[iFinal] || '').trim().toUpperCase() : '',
      qty:   iQty !== -1 ? (toNum(row[iQty]) || 1) : 1,
      unit:  iUnit !== -1 ? String(row[iUnit] || '').trim() : '',
    });
  }
  return out;
}

// ── FORECAST ────────────────────────────────────────────────────────────
// Mesmo layout da Estrutura (Cód. Produto / Cód. Próximo Uso / Uso), mas com uma
// linha de meses (ex: "jul/26") acima da linha de cabeçalho, alinhada por coluna —
// cada célula já vem com a quantidade prevista do "próximo uso" multiplicada pelo
// Uso daquela linha, então só precisamos somar por material quando ele aparece em
// mais de uma relação (mesma lógica de agregação da Estrutura). As células de mês
// são datas de verdade no Excel (formatadas como "jul/26"), então lemos com
// cellDates:true e identificamos a coluna por instanceof Date, não pelo texto —
// já vimos essa pegadinha antes (planilha de trânsito) e o texto muda conforme
// a formatação regional do Excel de quem gerou o arquivo.
function parseForecastSheet(ws) {
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
  const headerRowIdx = rows.findIndex(r => r.some(c => String(c).trim() === 'Cód. Produto'));
  if (headerRowIdx === -1) return null;
  const header = rows[headerRowIdx].map(h => String(h).trim());
  const iCode   = header.indexOf('Cód. Produto');
  const iParent = header.indexOf('Cód. Próximo Uso');
  const iQty    = header.indexOf('Uso');
  if (iCode === -1 || iParent === -1) return null;
  const monthRow = headerRowIdx > 0 ? rows[headerRowIdx - 1] : [];
  const monthCols = [];
  monthRow.forEach((cell, col) => {
    const d = cell instanceof Date && !isNaN(cell) ? cell : null;
    if (!d) return;
    monthCols.push({ col, key: toMonthKey(d) });
  });
  if (!monthCols.length) return null; // sem meses reconhecidos -> não é esse formato
  const out = [];
  for (let r = headerRowIdx + 1; r < rows.length; r++) {
    const row    = rows[r];
    const code   = String(row[iCode] || '').trim().toUpperCase();
    const parent = String(row[iParent] || '').trim().toUpperCase();
    if (!code || !parent || parent === '-') continue;
    const monthly = {};
    monthCols.forEach(({ col, key }) => { monthly[key] = toNum(row[col]); });
    out.push({ code, qty: iQty !== -1 ? (toNum(row[iQty]) || 1) : 1, monthly });
  }
  return out;
}

async function handleMemsForecastFile(file) {
  showLoading('Lendo arquivo de forecast…');
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array', cellDates: true });
    let rawRows = null;
    for (const sheetName of wb.SheetNames) {
      rawRows = parseForecastSheet(wb.Sheets[sheetName]);
      if (rawRows && rawRows.length) break;
    }

    if (rawRows && rawRows.length) {
      const codeSet = new Set(memsItems.map(i => i.code.toUpperCase()));
      const map = {}; // code -> { mk: soma }
      rawRows.forEach(r => {
        if (!codeSet.has(r.code)) return;
        if (!map[r.code]) map[r.code] = {};
        Object.entries(r.monthly).forEach(([mk, v]) => { map[r.code][mk] = (map[r.code][mk] || 0) + v; });
      });
      const items = Object.entries(map);
      const months = [...new Set(items.flatMap(([, mData]) => Object.keys(mData)))].sort();
      pendingMemsForecast = { items, months, filename: file.name, totalRows: rawRows.length, raw: true };
      const prev = document.getElementById('mems-forecast-prev');
      if (prev) prev.innerHTML = items.length ? `
        <div class="alert" style="background:var(--ok-bg);border-color:var(--ok-text);color:var(--ok-text)">
          <i class="ti ti-check"></i>
          <strong>${items.length} materiais</strong> com forecast (${months.map(fmtMonthKey).join(', ')})
          <span style="margin-left:auto;font-size:11px;color:var(--hint)">${file.name} · ${rawRows.length} linhas</span>
        </div>
      ` : `<div class="alert"><i class="ti ti-alert-circle"></i> Nenhum código do cadastro de materiais foi encontrado nesse arquivo.</div>`;
      toggleMemsUpdateApply(items.length > 0, applyMemsForecastImport);
    } else {
      const imported = await importCoverageFile(file, { avgForecast: ['forec'] });
      pendingMemsForecast = { items: imported, filename: file.name, raw: false };
      renderCoveragePreview('mems-forecast-prev', imported, file.name);
      toggleMemsUpdateApply(imported.length > 0, applyMemsForecastImport);
    }
  } catch(err) {
    showToast('Erro ao ler arquivo: ' + err.message, 'err');
  } finally {
    hideLoading();
  }
}

function applyMemsForecastImport() {
  if (!pendingMemsForecast) return;
  showLoading('Atualizando forecast…');
  setTimeout(() => {
    if (pendingMemsForecast.raw) {
      pendingMemsForecast.items.forEach(([code, monthData]) => {
        const existing = memsItems.find(i => i.code.toUpperCase() === code);
        if (!existing) return;
        existing.forecastHistory = existing.forecastHistory || {};
        Object.entries(monthData).forEach(([mk, qty]) => {
          existing.forecastHistory[mk] = Math.max(0, Math.round(qty));
        });
        existing.avgForecast = memsAvgForecast(existing);
      });
    } else {
      pendingMemsForecast.items.forEach(item => {
        const existing = memsItems.find(i => i.code.toUpperCase() === item.code);
        if (existing) existing.avgForecast = item.avgForecast;
      });
    }
    saveMemsItems();
    memsMeta.forecastUpdatedAt = new Date().toISOString();
    saveMemsMeta();
    const n = pendingMemsForecast.items.length;
    resetMemsMaterialsSection();
    hideLoading();
    showToast(`Forecast atualizado: ${n} itens`);
    renderMems();
  }, 0);
}

/* ── Migração de dados locais (localStorage) para o Supabase ──────────────
   Só relevante pra quem já usava o app antes da nuvem existir: se detectar
   dados nas chaves antigas do localStorage E a nuvem ainda estiver vazia,
   oferece subir tudo de uma vez (em vez de silenciosamente semear o catálogo
   padrão, que é o que acontece quando não há nada pra migrar). ── */
function readLegacyLocalData() {
  const pa        = loadJSON(STORAGE_KEY, null);
  const materials = loadJSON(MEMS_KEY, null);
  const hasData = (Array.isArray(pa) && pa.length) || (Array.isArray(materials) && materials.length);
  if (!hasData) return null;
  return {
    pa:        Array.isArray(pa) ? pa : [],
    materials: Array.isArray(materials) ? materials : [],
    bom:       loadJSON(MEMS_BOM_KEY, []),
    bomStock:  loadJSON(MEMS_BOM_STOCK_KEY, {}),
    meta:      loadJSON(MEMS_META_KEY, {}),
  };
}
async function isCloudDataEmpty() {
  const [pa, mat] = await Promise.all([
    sb.from('pa_products').select('code', { count: 'exact', head: true }),
    sb.from('materials').select('code', { count: 'exact', head: true }),
  ]);
  return (pa.count || 0) === 0 && (mat.count || 0) === 0;
}
let legacyLocalData = null;
async function offerLocalMigrationIfAny() {
  if (!isLoggedIn()) return;
  const legacy = readLegacyLocalData();
  if (!legacy) return;
  if (!(await isCloudDataEmpty())) return; // nuvem já tem dado — não oferece sobrescrever
  legacyLocalData = legacy;
  showMigrationBanner();
}
function showMigrationBanner() {
  if (!legacyLocalData || document.getElementById('migration-banner')) return;
  const bar = document.createElement('div');
  bar.id = 'migration-banner';
  bar.className = 'alert';
  bar.style.margin = '12px 24px 0';
  bar.innerHTML = `
    <i class="ti ti-cloud-upload" aria-hidden="true"></i>
    Detectamos dados salvos neste navegador (${legacyLocalData.pa.length} PA · ${legacyLocalData.materials.length} materiais).
    <button class="btn btn-primary btn-sm" id="btn-migrate-now" style="margin-left:auto"><i class="ti ti-cloud-upload" aria-hidden="true"></i> Migrar para a nuvem</button>
    <button class="btn btn-ghost btn-sm" id="btn-migrate-dismiss">Ignorar</button>
  `;
  document.querySelector('.app')?.prepend(bar);
  document.getElementById('btn-migrate-dismiss')?.addEventListener('click', () => bar.remove());
  document.getElementById('btn-migrate-now')?.addEventListener('click', runLocalMigration);
}
async function runLocalMigration() {
  if (!legacyLocalData) return;
  showLoading('Migrando dados para a nuvem…');
  try {
    if (legacyLocalData.pa.length)                       { state._setAll(legacyLocalData.pa); await storage.save(legacyLocalData.pa); }
    if (legacyLocalData.materials.length)                 { memsItems = legacyLocalData.materials; await saveMemsItems(); }
    if (legacyLocalData.bom.length)                       { memsBom = legacyLocalData.bom; await saveMemsBom(); }
    if (Object.keys(legacyLocalData.bomStock || {}).length) { memsBomStock = legacyLocalData.bomStock; await saveMemsBomStock(); }
    if (Object.keys(legacyLocalData.meta || {}).length)     { memsMeta = legacyLocalData.meta; await saveMemsMeta(); }
    document.getElementById('migration-banner')?.remove();
    legacyLocalData = null;
    showToast('Dados migrados para a nuvem.');
    if (activeTab === 'dashboard') renderDashboard();
    else if (activeTab === 'mems') renderMems();
    else renderEditor();
  } catch (err) {
    showToast('Erro na migração: ' + err.message, 'err');
  } finally {
    hideLoading();
  }
}

/* ═══════════════════════════════════════════════
   ALERTAS DE ESTOQUE — validade de lotes + slow moving
   Aba nova ao lado do Painel de indicadores (que não muda em nada):
   - Validade: lotes de PA vencendo nos próximos 12 meses (importados via
     card "Importar validade (lotes)"; snapshot — cada import substitui tudo)
   - Slow moving: calculado dos dados que já existem (vendas 6m × 2 ÷ estoque
     = giro anualizado); nada novo pra importar
═══════════════════════════════════════════════ */
const alertasEl = document.getElementById('view-alertas');
let paLots = [];            // [{ code, lot, expiry: 'YYYY-MM-DD', updatedAt }] — mestre de validade
let paLotStock = {};        // "CÓDIGO|LOTE" -> qty (saldo atual, vem da importação de estoque)
let pendingLots = null;     // importação em andamento
let alertasTab = 'validade';
let alertasFilters = { search: '', family: '', crit: '' };

async function loadPaLotStock() {
  const { data, error } = await sb.from('pa_lot_stock').select('code,lot,qty');
  if (error) { console.warn('pa_lot_stock indisponível:', error.message); return {}; }
  const map = {};
  data.forEach(r => { map[String(r.code).toUpperCase() + '|' + String(r.lot).toUpperCase()] = r.qty; });
  return map;
}
async function savePaLotStock() {
  const { error: delErr } = await sb.from('pa_lot_stock').delete().neq('code', '');
  if (delErr) { showToast('Erro ao salvar saldo por lote: ' + delErr.message, 'err'); return; }
  const keys = Object.keys(paLotStock);
  if (!keys.length) return;
  const now = new Date().toISOString();
  const rows = keys.map(k => { const [code, lot] = k.split('|'); return { code, lot, qty: paLotStock[k], updated_at: now }; });
  // insere em blocos pra não estourar limite de payload (planilha de estoque tem muitas linhas)
  for (let i = 0; i < rows.length; i += 500) {
    const { error } = await sb.from('pa_lot_stock').insert(rows.slice(i, i + 500));
    if (error) { showToast('Erro ao salvar saldo por lote: ' + error.message, 'err'); return; }
  }
}

async function loadPaLots() {
  const { data, error } = await sb.from('pa_lots').select('code,lot,expiry,updated_at');
  if (error) {
    // tabela pode ainda não existir no Supabase (schema.sql desatualizado) — não trava o boot
    console.warn('pa_lots indisponível:', error.message);
    return [];
  }
  return data.map(r => ({ code: r.code, lot: r.lot, expiry: r.expiry, updatedAt: r.updated_at }));
}
async function savePaLots() {
  const { error: delErr } = await sb.from('pa_lots').delete().neq('code', '');
  if (delErr) { showToast('Erro ao salvar lotes: ' + delErr.message, 'err'); return false; }
  if (!paLots.length) return true;
  const now = new Date().toISOString();
  // grava em blocos — o mestre de validade pode ter milhares de lotes
  for (let i = 0; i < paLots.length; i += 500) {
    const { error } = await sb.from('pa_lots').insert(
      paLots.slice(i, i + 500).map(l => ({ code: l.code, lot: l.lot || '', expiry: l.expiry, updated_at: now }))
    );
    if (error) { showToast('Erro ao salvar lotes: ' + error.message, 'err'); return false; }
  }
  return true;
}

/* ── Regras de criticidade (por lote, dias até vencer) ── */
function lotDaysLeft(expiry) {
  const d = expiry ? new Date(expiry + 'T00:00:00') : null;
  if (!d || isNaN(d)) return null;
  return Math.ceil((d - new Date().setHours(0, 0, 0, 0)) / 86400000);
}
const LOT_CRIT = {
  vencido:  { label: 'Vencido',  cls: 'b-crit', order: 0 },
  critico:  { label: 'Crítico',  cls: 'b-crit', order: 1 },
  atencao:  { label: 'Atenção',  cls: 'b-warn', order: 2 },
  monitorar:{ label: 'Monitorar',cls: 'b-high', order: 3 },
};
function lotCrit(days) {
  if (days == null) return null;
  if (days < 0)   return 'vencido';
  if (days < 90)  return 'critico';
  if (days < 180) return 'atencao';
  return 'monitorar';
}
// Janela da aba: até 12 meses à frente (inclui vencidos — pior caso possível).
// A quantidade NÃO vem do mestre de validade (que é histórico e não tem saldo
// atual) — vem do cruzamento por (código + lote) com a importação de estoque.
// Só entra o lote que satisfaz as DUAS condições (E):
//   1) o código é de um produto acabado (PA) cadastrado — ignora lote de
//      material/PI que porventura tenha vindo no arquivo de validade;
//   2) tem saldo em estoque hoje (cruzamento com a planilha de estoque > 0) —
//      lote já consumido não gera alerta de validade.
function lotsInWindow() {
  return paLots
    .map(l => ({
      ...l,
      qty: paLotStock[String(l.code).toUpperCase() + '|' + String(l.lot).toUpperCase()] || 0,
      days: lotDaysLeft(l.expiry),
    }))
    .filter(l => l.qty > 0 && state.getByCode(l.code) != null && l.days != null && l.days <= 365);
}

/* ── Slow moving (calculado, PA) ──────────────────────────────────────────
   Giro anualizado = (vendas dos últimos 6 meses × 2) ÷ estoque atual.
   Regra (da proposta de design): giro < 2x/ano = giro baixo · < 1x = sem giro.
   Só considera itens COM estoque (sem estoque não há capital imobilizado). */
const SLOW_GIRO_LIMIT = 2;
function paAnnualTurnover(p) {
  const stock = p.stock || 0;
  if (stock <= 0) return null;
  const sales6m = getMonthlySales(p).reduce((a, b) => a + b, 0);
  return (sales6m * 2) / stock;
}
function paLastSaleMonth(p) {
  const sh = p.salesHistory || {};
  const keys = Object.keys(sh).filter(k => (sh[k] || 0) > 0).sort();
  return keys.length ? keys[keys.length - 1] : null;
}
function slowMovingRows() {
  return state.getAll()
    .map(p => ({ p, giro: paAnnualTurnover(p) }))
    .filter(x => x.giro != null && x.giro < SLOW_GIRO_LIMIT)
    .sort((a, b) => a.giro - b.giro);
}

function exportValidadeCSV(rows, products) {
  const header = ['Código', 'Descrição', 'Lote', 'Família', 'Qtd', 'Validade', 'Dias restantes', 'Criticidade'];
  const lines = rows.map(l => {
    const p = products.get(l.code.toUpperCase());
    return [l.code, `"${p?.description || ''}"`, l.lot || '', `"${p?.family || ''}"`, l.qty || 0,

function exportSlowMovingCSV(rows) {

/* ── Importação de lotes com validade ─────────────────────────────────────
   Cabeçalho flexível: procura a linha que tenha colunas de código, lote e
   validade (nomes variam conforme o relatório do Dynamics). Datas aceitas
   como célula de data do Excel ou texto dd/mm/aaaa. */
// Mestre de validade: só precisa de código + lote + data de validade. A
// quantidade NÃO é lida daqui (o saldo atual vem do cruzamento com o estoque).
function parseLotsSheet(ws) {
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
  const findCol = (header, patterns) => header.findIndex(h => patterns.some(rx => rx.test(String(h).trim().toLowerCase())));
  let headerRowIdx = -1, iCode = -1, iLot = -1, iExpiry = -1;
  for (let r = 0; r < Math.min(rows.length, 20); r++) {
    const header = rows[r];
    const c = findCol(header, [/n[úu]mero do item/, /^c[óo]d/, /^item$/, /c[óo]digo/]);
    const l = findCol(header, [/lote/]);
    const v = findCol(header, [/valid/, /venc/, /expira/]);
    if (c !== -1 && l !== -1 && v !== -1) { headerRowIdx = r; iCode = c; iLot = l; iExpiry = v; break; }
  }
  if (headerRowIdx === -1) return null;
  const out = [];
  for (let r = headerRowIdx + 1; r < rows.length; r++) {
    const row = rows[r];
    const code = String(row[iCode] || '').trim().toUpperCase();
    if (!code) continue;
    const rawDate = row[iExpiry];
    const d = rawDate instanceof Date && !isNaN(rawDate) ? rawDate : toDate(rawDate);
    if (!d || isNaN(d)) continue;
    out.push({
      code,
      lot: String(row[iLot] || '').trim(),
      expiry: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`,
    });
  }
  return out;
}

async function handleLotsFile(file) {
  if (!file) return;
  if (!isLoggedIn()) { showToast('Faça login antes de importar os lotes.', 'err'); return; }
  showLoading('Lendo arquivo de lotes…');
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array', cellDates: true });
    let rows = null;
    for (const sheetName of wb.SheetNames) {
      rows = parseLotsSheet(wb.Sheets[sheetName]);
      if (rows && rows.length) break;
    }
    if (!rows || !rows.length) {
      showToast('Não encontramos colunas de código, lote e validade nesse arquivo.', 'err');
      const info = document.getElementById('prev-lots-info');
      if (info) {
        document.getElementById('prev-lots').classList.add('visible');
        info.innerHTML = `<i class="ti ti-alert-circle" aria-hidden="true"></i> Colunas encontradas:<br><span style="font-size:11px;color:var(--hint)">${memsFileHeaderPreview(wb)}</span>`;
        document.getElementById('prev-lots-body').innerHTML = '';
        document.getElementById('prev-lots-count').textContent = '';
      }
      return;
    }
    // dedup por (código + lote + validade) — alguns relatórios repetem o lote por depósito
    const map = {};
    rows.forEach(r => { map[`${r.code}|${r.lot}|${r.expiry}`] = r; });
    const items = Object.values(map).sort((a, b) => a.expiry.localeCompare(b.expiry));
    pendingLots = { items, filename: file.name, totalRows: rows.length };
    renderLotsPreview();
  } catch (err) {
    showToast('Erro ao ler o arquivo: ' + err.message, 'err');
  } finally {
    hideLoading();
  }
}

function renderLotsPreview() {
  if (!pendingLots) return;
  const { items, filename, totalRows } = pendingLots;
  const prev = document.getElementById('prev-lots');
  prev.classList.add('visible');
  document.getElementById('prev-lots-info').innerHTML =
    `<i class="ti ti-file" aria-hidden="true"></i> <strong>${filename}</strong> · ${totalRows} linhas`;
  document.getElementById('prev-lots-body').innerHTML = items.slice(0, 50).map(l => `<tr>
      <td><strong>${l.code}</strong></td>
      <td style="font-size:11px;color:var(--muted)">${l.lot || '—'}</td>
      <td>${new Date(l.expiry + 'T00:00:00').toLocaleDateString('pt-BR')}</td>
    </tr>`).join('') + (items.length > 50 ? `<tr><td colspan="3" class="empty">… e mais ${items.length - 50} lotes</td></tr>` : '');
  document.getElementById('prev-lots-count').textContent =
    `${items.length} lotes · substitui a lista atual (${paLots.length} lotes) · saldo vem do estoque`;
}

function cancelLotsImport() {
  pendingLots = null;
  const prev = document.getElementById('prev-lots');
  if (prev) prev.classList.remove('visible');
  const fi = document.getElementById('fi-lots');
  if (fi) fi.value = '';
}

async function applyLotsImport() {
  if (!pendingLots) return;
  showLoading('Atualizando lotes…');
  try {
    const now = new Date().toISOString();
    paLots = pendingLots.items.map(l => ({ ...l, updatedAt: now }));
    const ok = await savePaLots();
    if (ok) showToast(`Lotes atualizados: ${paLots.length} lotes com validade`);
    cancelLotsImport();
    if (activeTab === 'alertas') renderAlertas();
  } finally {
    hideLoading();
  }
}

/* ── Boot ── */
async function boot() {
  showLoading('Carregando dados…');
  try {
    const { data: sessionData } = await sb.auth.getSession();
    currentSession = sessionData?.session ?? null;
    await loadCurrentProfile();

    const [products, materials, meta, bom, bomStock, lots, lotStock] = await Promise.all([
      storage.load(),
      loadMemsItems(),
      loadMemsMeta(),
      loadMemsBom(),
      loadMemsBomStock(),
      loadPaLots(),
      loadPaLotStock(),
    ]);
    state._setAll(products);

    return '—';
  };
  const dryAll   = memsDryBranches(item);
  const dryMap   = Object.fromEntries(dryAll.map(b => [b.final, b]));
  const drySales = dryAll.filter(b => b.hasSales);
  const rows = Object.entries(factors).map(([node, factor]) => {
    const stock = memsNodeStock(node);
    return { node, type: nodeType(node), stock, factor, equiv: stock * factor, dry: dryMap[node] };
  }).sort((a,b) => b.equiv - a.equiv);
  const embedded = rows.reduce((s,r) => s + r.equiv, 0);
  const own      = item.stock || 0;
  const cons     = item.avgConsumption || 0;
  const cov      = memsCoverage(item);
  const situacao = r => {
    if (r.dry) {
      if (r.dry.dry) {
        return r.dry.hasSales
          ? `<span style="color:var(--danger-text);font-weight:500">⚠️ ruptura imediata</span>`
          : `<span style="color:var(--hint)">ramo seco · sem vendas</span>`;
      }
      return r.dry.hasSales
        ? `<span style="color:var(--warn-text);font-weight:500">⚠️ esgota em ${r.dry.monthsLeft.toFixed(1)}m</span>`
        : `<span style="color:var(--hint)">ramo em risco · sem vendas</span>`;
    }
    if (r.type === 'PA' && r.stock > 0) return `<span style="color:var(--ok-text)">✓ atendendo</span>`;
    return '<span style="color:var(--hint)">—</span>';
  };
  const rowsHtml = rows.map(r => {
    const rowBg = r.dry?.hasSales ? (r.dry.dry ? 'var(--danger-bg)' : 'var(--warn-bg)') : '';
    return `<tr ${rowBg ? `style="background:${rowBg}"` : ''}>
      <td><strong>${r.node}</strong></td>
      <td class="num-c"><span class="badge" style="background:var(--accent-bg);color:var(--accent)">${r.type}</span></td>
      <td class="num-c">${fmt.int(r.stock)}</td>
      <td class="num-c" style="color:var(--muted)">${r.factor.toLocaleString('pt-BR',{maximumFractionDigits:3})}</td>
      <td class="num-c" style="font-weight:500">${fmt.int(r.equiv)}</td>
      <td style="font-size:12px;white-space:nowrap">${situacao(r)}</td>
    </tr>`;
  }).join('');
  document.getElementById('modal-title').textContent = `Cobertura em cadeia — ${item.code}`;
  document.getElementById('modal-body').innerHTML = `
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px">${item.desc}</p>
    ${drySales.length ? `
      <div class="alert" style="margin-bottom:12px">
        <i class="ti ti-alert-triangle"></i>
        <span><strong>${drySales.length} ${drySales.length===1?'produto':'produtos'} em risco de ruptura</strong> — o estoque desse ramo específico não cobre até a reposição do material: ${drySales.map(b => b.dry ? `${b.final} (imediata)` : `${b.final} (~${b.monthsLeft.toFixed(1)}m)`).join(', ')}</span>
      </div>
    ` : ''}
    <div class="tbl-wrap" style="margin-bottom:0">
      <table>
        <thead><tr><th>Consumido por</th><th class="num-c">Nível</th><th class="num-c">Estoque</th><th class="num-c">Uso/un</th><th class="num-c">Equivalente (un)</th><th>Situação</th></tr></thead>
        <tbody>${rowsHtml || '<tr><td colspan="6" class="empty">Nenhum produto na cadeia.</td></tr>'}</tbody>
      </table>
    </div>
    <div style="display:flex;gap:20px;flex-wrap:wrap;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);font-size:13px">
      <div><span style="color:var(--muted)">Estoque próprio:</span> <strong>${fmt.int(own)} un</strong></div>
      <div><span style="color:var(--muted)">Embutido na cadeia:</span> <strong>${fmt.int(embedded)} un</strong></div>
      <div><span style="color:var(--muted)">Consumo médio:</span> <strong>${cons > 0 ? fmt.int(Math.ceil(cons)) + ' un/mês' : '—'}</strong></div>
      <div><span style="color:var(--muted)">Cobertura em cadeia:</span> <strong>${fmt.cov(cov)}</strong></div>
    </div>
    <div class="form-actions" style="margin-top:16px">
      <button class="btn btn-primary" id="btn-modal-cancel">Fechar</button>
    </div>`;
  document.getElementById('btn-modal-cancel').addEventListener('click', closeProductModal);
  const modalBox = document.querySelector('#modal-overlay .modal');
  if (modalBox) modalBox.style.maxWidth = '680px';
  document.getElementById('modal-overlay').style.display = 'flex';
}

// Pra Antecipação: se o item entrou na fila por causa de um ramo específico (a soma
// agregada tá ok, mas aquele PA vai secar), mostra a data de ruptura DAQUELE ramo —
// senão a coluna "Esgota em" mostraria a data agregada, distante, sem explicar por
// que o item apareceu na lista.
function memsAnticipationDisplayInfo(item) {
  const branches = memsAnticipationSalesBranches(item);
  if (branches.length) {
    const worst = branches.reduce((a, b) => a.monthsLeft < b.monthsLeft ? a : b);
    return { stockoutDate: new Date(Date.now() + worst.monthsLeft * 30.44 * 86400000), note: `ramo ${worst.final}` };
  }
  return { stockoutDate: memsStockoutDate(item), note: null };
}

function openMemsAlertModal(type) {
  const isPurchase = type === 'purchase';
  const items = isPurchase ? memsPurchaseQueue() : memsAnticipationQueue();
  const fmtDate = d => { const dt = d ? new Date(d) : null; return (dt instanceof Date && !isNaN(dt)) ? dt.toLocaleDateString('pt-BR') : '—'; };
  const rows = items.map(i => isPurchase ? `<tr>
      <td><strong>${i.code}</strong></td>
      <td class="td-desc"><div title="${i.desc}">${i.desc}</div></td>
      <td class="num-c">${fmt.int(i.stock||0)}</td>
      <td class="num-c">${fmt.int(i.avgConsumption||0)}/mês</td>
      <td class="num-c">${i.leadTime ?? '—'} m</td>
      <td class="num-c">${fmt.cov(memsCoverage(i))}</td>
      <td class="num-c">${Number.isFinite(memsLeadCoveragePct(i)) ? Math.round(memsLeadCoveragePct(i)*100)+'%' : '—'}</td>
    </tr>` : (() => {
      const info = memsAnticipationDisplayInfo(i);
      return `<tr>
      <td><strong>${i.code}</strong></td>
      <td class="td-desc"><div title="${i.desc}">${i.desc}</div></td>
      <td class="num-c">${fmt.int(i.stock||0)}</td>
      <td class="num-c">${fmt.int(i.avgConsumption||0)}/mês</td>
      <td>${fmtDate(info.stockoutDate)}${info.note ? `<div style="font-size:10px;color:var(--hint)">${info.note}</div>` : ''}</td>
      <td>${fmtDate(memsNextArrival(i))}</td>
    </tr>`;
    })()).join('');
  const head = isPurchase
    ? `<tr><th>Código</th><th>Descrição</th><th class="num-c">Estoque</th><th class="num-c">Consumo</th><th class="num-c">Lead Time</th><th class="num-c">Cobertura</th><th class="num-c">% coberto</th></tr>`
    : `<tr><th>Código</th><th>Descrição</th><th class="num-c">Estoque</th><th class="num-c">Consumo</th><th>Esgota em</th><th>Chega em</th></tr>`;
  document.getElementById('modal-title').textContent = isPurchase
    ? `Compra pendente — ${items.length} ${items.length===1?'item':'itens'}`
    : `Necessário antecipação — ${items.length} ${items.length===1?'item':'itens'}`;
  document.getElementById('modal-body').innerHTML = `
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px">${isPurchase
      ? 'Itens cujo estoque atual acaba antes do lead time de um novo pedido chegar.'
      : 'Itens cujo estoque atual acaba antes do primeiro recebimento já em trânsito.'}</p>
    <div class="tbl-wrap" style="margin-bottom:0">
      <table>
        <thead>${head}</thead>
        <tbody>${rows || `<tr><td colspan="${isPurchase?7:6}" class="empty">Nenhum item em alerta.</td></tr>`}</tbody>
      </table>
    </div>
    <div class="form-actions" style="margin-top:16px">
      <button class="btn btn-primary" id="btn-modal-cancel">Fechar</button>
    </div>`;
  document.getElementById('btn-modal-cancel').addEventListener('click', closeProductModal);
  const modalBox = document.querySelector('#modal-overlay .modal');
  if (modalBox) modalBox.style.maxWidth = '760px';
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeProductModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  const modalBox = document.querySelector('#modal-overlay .modal');
  if (modalBox) modalBox.style.maxWidth = '';
  editingCode = null;
}
</script>
</body>
</html>
